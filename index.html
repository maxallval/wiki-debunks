<style>

.header { background: white; border-bottom: 1px solid #e0e0e0; padding: 2rem 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }

.sidebar-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 1rem; letter-spacing: 0.5px; }

.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; text-align: center; }

.card { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 1.5rem; cursor: pointer; transition: all 0.3s; position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #0052cc, #5eb3ff); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }

.badge { display: inline-block; background: #f0f4ff; color: #0052cc; padding: 0.5rem 1rem; border-radius: 20px; font-size: 12px; font-weight: 600; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.card-title { font-size: 16px; font-weight: 600; margin: 0.75rem 0; line-height: 1.4; }
.card-meta { font-size: 13px; color: #666; margin-top: 1rem; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }

.close-btn { background: none; border: none; font-size: 24px; color: #666; padding: 0; cursor: pointer; }

.import-success { background: #e6ffed !important; border: 1px solid #34d399; color: #065f46; padding: 1rem; border-radius: 6px; }
.import-error { background: #fee !important; border: 1px solid #f87171; color: #7f1d1d; padding: 1rem; border-radius: 6px; }

.form-group { margin-bottom: 1.5rem; }
.form-group label { display: block; font-weight: 600; margin-bottom: 0.5rem; font-size: 14px; }
.form-group textarea { resize: vertical; min-height: 100px; }
.form-actions { display: flex; gap: 1rem; margin-top: 2rem; }

.detail-section { background: white; border: 1px solid #e0e0e0; border-radius: 8px; padding: 2rem; margin-bottom: 1.5rem; }
.detail-section h3 { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #0052cc; margin-bottom: 1rem; letter-spacing: 0.5px; }
.detail-section p { color: #333; line-height: 1.8; margin-bottom: 0.75rem; }
.sources-list { list-style: none; }
.sources-list li { padding: 0.75rem 0; border-bottom: 1px solid #f0f0f0; display: flex; align-items: flex-start; gap: 0.75rem; }

.footer { background: white; border-top: 1px solid #e0e0e0; padding: 2rem; text-align: center; color: #666; font-size: 13px; margin-top: 3rem; }

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { position: relative; top: 0; }
  .sidebar-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 1rem; }

@media (max-width: 600px) {

  .controls { flex-direction: column; }

<body>

<div class="header">
  <div class="header-content">
    <h1>🇶🇨 Wiki Debunks — Souveraineté</h1>
    <p>Base de données collaborative avec 100+ réfutations documentées</p>
    <div class="controls">
      <input type="text" id="search" placeholder="Chercher un débunk...">
      <select id="categoryFilter">
        <option value="">Toutes les catégories</option>

      <button class="btn-primary" onclick="openAddModal()">+ Ajouter</button>

</div>

<div class="container">
  <div id="stats" class="stats"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

      <div id="debunk-list" class="debunk-grid"></div>
      <div id="detail-view" class="detail-view"></div>
      <div id="empty-state" class="empty-state"></div>
    </main>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Ajouter un débunk</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>

      <label>Catégorie</label>
      <input type="text" id="form-category" placeholder="ex: Économie, Transferts...">
    </div>
    <div class="form-group">
      <label>Affirmation</label>
      <textarea id="form-claim" placeholder="Entrez l'affirmation à débunker..."></textarea>
    </div>
    <div class="form-group">
      <label>Contexte</label>
      <textarea id="form-context" placeholder="Qui l'a dite? Quand? Où?"></textarea>
    </div>
    <div class="form-group">
      <label>Réfutation</label>
      <textarea id="form-rebuttal" placeholder="L'explication et les faits..."></textarea>
    </div>
    <div class="form-group">
      <label>Sources (Titre | URL)</label>
      <textarea id="form-sources" placeholder="Titre | https://..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveDebunk()">Publier</button>
    </div>
  </div>
</div>

<div class="modal" id="import-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📥 Importer</h2>
      <button class="close-btn" onclick="closeImportModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Colle du JSON</label>
      <textarea id="import-json" placeholder='[{"id":101,...}]'></textarea>
    </div>
    <div class="form-group">
      <label>Ou upload un fichier</label>
      <input type="file" id="import-file" accept=".json">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeImportModal()">Annuler</button>
      <button class="btn-primary" onclick="processImport()">Importer</button>
    </div>
    <div id="import-result" style="margin-top: 1rem; display: none;"></div>
  </div>
</div>

<div class="footer">

<script>
const debunks = [{"id": 1, "category": "Fiscalité & Transferts", "claim": "« Le Québec reçoit plus en transferts fédéraux que ce qu'il contribue »", "context": "Affirmation commune pour justifier l'importance du fédéralisme.", "rebuttal": "Faux. Québec paie 18-20% impôts fédéraux pour ~23% population. Les transferts sont par capita.", "sources": ["IRPP | https://irpp.org/", "Statcan | https://www.statcan.gc.ca/"]}, {"id": 2, "category": "Viabilité Économique", "claim": "« Un Québec indépendant serait en crise économique »", "context": "Scénario catastrophe référendaires.", "rebuttal": "PIB ~$400B, plus grand que Suisse/Suède. Petites nations prospères (Nouvelle-Zélande, Irlande).", "sources": ["Statcan | https://www.statcan.gc.ca/", "OCDE | https://www.oecd.org/"]}, {"id": 3, "category": "Monétisation & Finances", "claim": "« Québec ne pourrait pas monétiser sa dette »", "context": "Argument de crise financière.", "rebuttal": "Accès aux marchés de capitaux. Suède, Norvège, Nouvelle-Zélande empruntent sans problème.", "sources": ["Banque Mondiale | https://data.worldbank.org/"]}, {"id": 4, "category": "Dette Fédérale", "claim": "« Québec assumerait énorme part dette fédérale »", "context": "Québec État insolvable.", "rebuttal": "Partage proportionnel (~20%) et récupération proportionnelle actifs fédéraux. Négociation standard.", "sources": ["Observatoire Québec | https://www.observatoire-souverainete.com/"]}, {"id": 5, "category": "Pensions & Retraites", "claim": "« Retraités perdraient pensions »", "context": "Droits acquis (CPP/RRQ) disparaîtraient.", "rebuttal": "RRQ géré par Québec depuis 1966. Cotisations restent à Québec. Continuité garantie.", "sources": ["RRQ | https://www.rrq.gouv.qc.ca/"]}, {"id": 6, "category": "Droits & Libertés", "claim": "« Charte droits disparaîtrait »", "context": "Fin protections légales.", "rebuttal": "Charte québécoise (1975) antérieure à canadienne (1982). Québec aurait sa constitution.", "sources": ["Charte QC | https://www.quebec.ca/"]}, {"id": 7, "category": "Emploi & Chômage", "claim": "« Chômage massif »", "context": "Effondrement emploi.", "rebuttal": "Post-1995 croissance continue. Micro-États (Luxembourg) taux chômage plus bas que Canada.", "sources": ["Statcan | https://www.statcan.gc.ca/"]}, {"id": 8, "category": "Commerce International", "claim": "« Pas commerce Québec-Canada »", "context": "Tarifs détruiraient échange.", "rebuttal": "Commerce États indépendants norme. Accord inévitable. Intérêt économique pousse libre-échange.", "sources": ["OMC | https://www.wto.org/"]}, {"id": 9, "category": "Ressources Naturelles", "claim": "« Pas assez ressources »", "context": "Minimisation actifs québécois.", "rebuttal": "Hydro (1er nord-américain), forêts (27% Canada), minéraux, eaux douces (15% monde).", "sources": ["Hydro-Québec | https://www.hydroquebec.com/"]}, {"id": 10, "category": "Immigration & Démographie", "claim": "« Perte contrôle immigration »", "context": "Immigration incontrôlée.", "rebuttal": "Québec contrôle déjà (Accord 1991). Taux stable 1% pop/an. Démo stable (projections ISQ).", "sources": ["Immigration QC | https://www.immigration-quebec.gouv.qc.ca/"]}, {"id": 11, "category": "Infrastructure", "claim": "« Pas entretien infrastructures »", "context": "Dépendance fédérale.", "rebuttal": "Québec contribue plus qu'il reçoit. Provinces australiennes gèrent leurs infra seules.", "sources": ["Infrastructure | https://www.infrastructure.gc.ca/"]}, {"id": 12, "category": "Langue & Culture", "claim": "« Culture perdrait richesse »", "context": "Appauvrissement culturel.", "rebuttal": "Inverse vrai. France protège culture subventions. Québec indépendant subventionnerait davantage.", "sources": ["MCC | https://www.culture.gouv.fr/"]}, {"id": 13, "category": "Gouvernance", "claim": "« Moins transparent »", "context": "Gouvernement moins redevable.", "rebuttal": "Transparency Int. Canada #12, Suisse #6. Petit gouvernement plus transparent.", "sources": ["Transparency Int. | https://www.transparency.org/"]}, {"id": 14, "category": "Gouvernance", "claim": "« Instabilité gouvernementale »", "context": "Coalitions fragiles.", "rebuttal": "Suisse coalitions 1959=stable. Belgique, Suède stables. Coalitions forcent compromis.", "sources": ["OCDE | https://www.oecd.org/"]}, {"id": 15, "category": "Géopolitique", "claim": "« Aucun poids diplomatique »", "context": "Marginalisation internationale.", "rebuttal": "Luxembourg, Malte faibles mais influents ONU. Québec (8.5M) siégerait ONU, Francophonie.", "sources": ["ONU | https://www.un.org/"]}, {"id": 16, "category": "Innovation & Technologie", "claim": "« Secteur tech dépend fédéral »", "context": "Innovations québécoises minimes.", "rebuttal": "Leader: jeux vidéo (Ubisoft), IA (Mila), aérospatiale. Compétitifs malgré fédéral.", "sources": ["Mila | https://mila.quebec/"]}, {"id": 17, "category": "Électricité & Énergie", "claim": "« Pas export électricité »", "context": "Marchés USA/Canada dépendent fédéral.", "rebuttal": "Hydro exporte déjà USA contrats directs. États US négocient directement électricité.", "sources": ["Hydro-Québec | https://www.hydroquebec.com/"]}, {"id": 18, "category": "Éducation", "claim": "« Universités perdraient accréditations »", "context": "Diplômes pas reconnus.", "rebuttal": "McGill, UdeM reconnues mondialement. Accréditation=qualité recherche pas politique.", "sources": ["QS Rankings | https://www.topuniversities.com/"]}, {"id": 19, "category": "Santé", "claim": "« Système santé s'effondrerait »", "context": "Services détérioreraient.", "rebuttal": "Québec gère déjà système (Loi 101). Universel établi. Indépendance=plus flexibilité.", "sources": ["Santé QC | https://www.quebec.ca/"]}, {"id": 20, "category": "Transports & Infrastructure", "claim": "« Pas gérer transports publics »", "context": "Trop complexe province.", "rebuttal": "Québec gère déjà: métro Mtl, STM. Zurich, Copenhague gèrent excellents transits.", "sources": ["STM | https://www.stm.info/"]}, {"id": 21, "cat   statsDiv.innerHTML = `
    <div class="stat-card"><div class="stat-number">${allDebunks.length}</div><div class="stat-label">Débunks</div></div>
    <div class="stat-card"><div class="stat-number">${categories}</div><div class="stat-label">Catégories</div></div>
    <div class="stat-card"><div class="stat-number">${sources}</div><div class="stat-label">Sources</div></div>
  `;
}

function renderSidebar() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const sidebar = document.getElementById('sidebar');
  
  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-title">Catégories</div>
      <button class="sidebar-btn active" onclick="filterBySidebar(null)">Tous</button>
      ${categories.map(cat => `<button class="sidebar-btn" onclick="filterBySidebar('${cat}')">${cat}</button>`).join('')}
    </div>
  `;
}

function populateCategoryFilter() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const select = document.getElementById('categoryFilter');
  select.innerHTML = '<option value="">Toutes les catégories</option>' + 
    categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
}

function filterBySidebar(cat) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('categoryFilter').value = cat || '';
  filterDebunks();
}

function filterDebunks() {
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  
  filteredDebunks = allDebunks.filter(d => {
    const matchCat = !category || d.category === category;
    const matchSearch = !search || d.claim.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  
  renderDebunks();
}

function renderDebunks() {
  const list = document.getElementById('debunk-list');
  const empty = document.getElementById('empty-state');
  
  if (filteredDebunks.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = '<h2>Aucun résultat</h2><p>Essayez une autre recherche</p>';
    return;
  }
  
  list.style.display = 'grid';
  empty.style.display = 'none';
  
  list.innerHTML = filteredDebunks.map(d => `
    <div class="card" onclick="showDetail(${d.id})">
      <div class="badge">${d.category}</div>
      <h3 class="card-title">${d.claim}</h3>
      <div class="card-meta">📌 ${d.sources.length} source${d.sources.length > 1 ? 's' : ''}</div>
    </div>
  `).join('');
}

function showDetail(id) {
  const debunk = allDebunks.find(d => d.id === id);
  if (!debunk) return;
  
  document.getElementById('debunk-list').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  
  const detail = document.getElementById('detail-view');
  detail.innerHTML = `
    <button class="btn-secondary" onclick="backToList()">← Retour</button>
    <div class="detail-header"><span class="badge">${debunk.category}</span><h1>${debunk.claim}</h1></div>
    <div class="detail-section"><h3>📍 Contexte</h3><p>${debunk.context}</p></div>
    <div class="detail-section"><h3>✅ Réfutation</h3><p>${debunk.rebuttal}</p></div>
    <div class="detail-section"><h3>📚 Sources</h3><ul class="sources-list">
      ${debunk.sources.map(s => {
        const parts = s.split(' | ');
        const title = parts[0];
        const url = parts[1];
        return `<li><strong>${title}</strong>${url ? ` <a href="${url}" target="_blank" rel="noopener">🔗</a>` : ''}</li>`;
      }).join('')}
    </ul></div>
    <div style="display: flex; gap: 1rem;"><button class="btn-secondary" onclick="openEditModal(${id})">Éditer</button><button class="btn-secondary" onclick="deleteDebunk(${id})" style="color: #d32f2f;">Supprimer</button></div>
  `;
  detail.classList.add('show');
}

function backToList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('debunk-list').style.display = 'grid';
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Ajouter un débunk';
  ['form-category', 'form-claim', 'form-context', 'form-rebuttal', 'form-sources'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const debunk = allDebunks.find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Éditer ce débunk';
  document.getElementById('form-category').value = debunk.category;
  document.getElementById('form-claim').value = debunk.claim;
  document.getElementById('form-context').value = debunk.context;
  document.getElementById('form-rebuttal').value = debunk.rebuttal;
  document.getElementById('form-sources').value = debunk.sources.join('\n');
  document.getElementById('modal').dataset.editId = id;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function openImportModal() {
  document.getElementById('import-modal').classList.add('open');
  document.getElementById('import-json').value = '';
  document.getElementById('import-file').value = '';
  document.getElementById('import-result').style.display = 'none';
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('open');
}

function processImport() {
  const jsonText = document.getElementById('import-json').value.trim();
  const fileInput = document.getElementById('import-file');
  const resultDiv = document.getElementById('import-result');
  
  if (jsonText) {
    try {
      const newDebunks = JSON.parse(jsonText);
      mergeDebunks(newDebunks, resultDiv);
    } catch (err) {
      showImportResult(resultDiv, 'error', `Erreur JSON: ${err.message}`);
    }
  } else if (fileInput.files.length > 0) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const newDebunks = JSON.parse(e.target.result);
        mergeDebunks(newDebunks, resultDiv);
      } catch (err) {
        showImportResult(resultDiv, 'error', `Erreur fichier: ${err.message}`);
      }
    };
    reader.readAsText(fileInput.files[0]);
  } else {
    showImportResult(resultDiv, 'error', 'Colle du JSON ou upload un fichier');
  }
}

function mergeDebunks(newDebunks, resultDiv) {
  if (!Array.isArray(newDebunks)) {
    showImportResult(resultDiv, 'error', 'Format invalide');
    return;
  }
  
  const existingIds = new Set(allDebunks.map(d => d.id));
  const toAdd = newDebunks.filter(d => !existingIds.has(d.id));
  
  if (toAdd.length === 0) {
    showImportResult(resultDiv, 'error', 'Aucun nouveau débunk');
    return;
  }
  
  allDebunks = [...allDebunks, ...toAdd];
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  
  showImportResult(resultDiv, 'success', `✅ ${toAdd.length} débunks ajoutés! Total: ${allDebunks.length}`);
  
  setTimeout(() => closeImportModal(), 2000);
}

function showImportResult(resultDiv, type, message) {
  resultDiv.style.display = 'block';
  resultDiv.className = type === 'success' ? 'import-success' : 'import-error';
  resultDiv.textContent = message;
}

function saveDebunk() {
  const category = document.getElementById('form-category').value.trim();
  const claim = document.getElementById('form-claim').value.trim();
  const context = document.getElementById('form-context').value.trim();
  const rebuttal = document.getElementById('form-rebuttal').value.trim();
  const sourceText = document.getElementById('form-sources').value.trim();
  
  if (!category || !claim || !rebuttal) {
    alert('Remplissez tous les champs');
    return;
  }
  
  const sources = sourceText.split('\n').filter(s => s.trim());
  const editId = document.getElementById('modal').dataset.editId;
  
  if (editId) {
    const idx = allDebunks.findIndex(d => d.id == editId);
    allDebunks[idx] = { ...allDebunks[idx], category, claim, context, rebuttal, sources };
  } else {
    allDebunks.push({
      id: Math.max(...allDebunks.map(d => d.id), 0) + 1,
      category, claim, context, rebuttal, sources
    });
  }
  
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  closeModal();
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
}

function deleteDebunk(id) {
  if (!confirm('Supprimer?')) return;
  allDebunks = allDebunks.filter(d => d.id !== id);
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

document.getElementById('search').addEventListener('input', filterDebunks);

initApp();
</script>
</body>
</html>
