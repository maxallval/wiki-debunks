<style>

.footer {

}

@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }

<body>

<div class="header">
  <div class="header-content">
    <h1>🇶🇨 Wiki Debunks — Souveraineté</h1>
    <p>Base de données collaborative de réfutations documentées sur les enjeux de souveraineté québécoise</p>
    <div class="controls">
      <input type="text" id="search" placeholder="Chercher un débunk...">
      <select id="categoryFilter">
        <option value="">Toutes les catégories</option>
      </select>
      <button class="btn-primary" onclick="openAddModal()">+ Ajouter un débunk</button>
      <button class="btn-secondary" onclick="openImportModal()">📥 Importer</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="stats" class="stats"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div id="debunk-list" class="debunk-grid"></div>
      <div id="detail-view" class="detail-view"></div>
      <div id="empty-state" class="empty-state"></div>
    </main>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Ajouter un débunk</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <input type="text" id="form-category" placeholder="ex: Économie, Transferts...">
    </div>
    <div class="form-group">
      <label>Affirmation (ce qui est faux)</label>
      <textarea id="form-claim" placeholder="Entrez l'affirmation à débunker..."></textarea>
    </div>
    <div class="form-group">
      <label>Contexte</label>
      <textarea id="form-context" placeholder="Qui l'a dite? Quand? Où?"></textarea>
    </div>
    <div class="form-group">
      <label>Réfutation</label>
      <textarea id="form-rebuttal" placeholder="L'explication et les faits qui contredisent..."></textarea>
    </div>
    <div class="form-group">
      <label>Sources (Titre | URL, une par ligne)</label>
      <textarea id="form-sources" placeholder="Statistiques Canada | https://...\nRapport IRPP | https://..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveDebunk()">Publier</button>
    </div>
  </div>
</div>

<div class="modal" id="import-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>📥 Importer des débunks</h2>
      <button class="close-btn" onclick="closeImportModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Colle le JSON ou upload un fichier</label>
      <textarea id="import-json" placeholder='[{"id":70,"category":"...","claim":"...","context":"...","rebuttal":"...","sources":[...]}]'></textarea>
    </div>
    <div class="form-group">
      <label>Ou upload un fichier JSON</label>
      <input type="file" id="import-file" accept=".json">
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeImportModal()">Annuler</button>
      <button class="btn-primary" onclick="processImport()">Importer</button>
    </div>
    <div id="import-result" style="margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none;"></div>
  </div>
</div>

<div class="footer">
  <p>Wiki Debunks Souveraineté © 2026 | Contenu collaboratif et documenté | <a href="#">À propos</a></p>
</div>

<script>
const debunks = [
  {"id": 1, "category": "Fiscalité & Transferts", "claim": "« Le Québec reçoit plus en transferts fédéraux que ce qu'il contribue »", "context": "Affirmation commune pour justifier l'importance du fédéralisme.", "rebuttal": "Faux. Les transferts en santé et éducation sont basés sur les populations; le Québec contribue davantage en impôts qu'il ne reçoit. Selon l'Institut de recherche en politiques publiques (IRPP), le Québec paie environ 18-20 % des impôts fédéraux pour ~23 % de la population.", "sources": ["IRPP | https://irpp.org/", "Statistiques Canada | https://www.statcan.gc.ca/"]},
  {"id": 2, "category": "Viabilité Économique", "claim": "« Un Québec indépendant serait en crise économique immédiate »", "context": "Scénario catastrophe présenté lors des campagnes référendaires.", "rebuttal": "Le Québec a un PIB de ~$400 milliards (plus grand que la Suisse, la Suède). Petites nations (Nouvelle-Zélande, Irlande, Danemark) ont des économies stables. Un Québec aurait accès aux marchés de capitaux, pourrait émettre sa propre devise.", "sources": ["Statistiques Canada | https://www.statcan.gc.ca/", "OCDE | https://www.oecd.org/", "FMI | https://www.imf.org/"]},
  {"id": 3, "category": "Monétisation & Finances", "claim": "« Un Québec indépendant ne pourrait pas monétiser sa dette »", "context": "Argument utilisé pour dire que la souveraineté causerait une crise financière.", "rebuttal": "Le Québec aurait accès aux marchés de capitaux internationaux, à un bilan solide. Des petites économies comme la Suède, Norvège, Nouvelle-Zélande empruntent régulièrement sans problème.", "sources": ["Banque Mondiale | https://data.worldbank.org/", "Standard & Poor's | https://www.spglobal.com/"]},
  {"id": 4, "category": "Dette Fédérale", "claim": "« Le Québec devrait assumer une part énorme de la dette canadienne »", "context": "Argument que le partage de la dette ferait du Québec un État insolvable.", "rebuttal": "Le partage de la dette est un enjeu de négociation. Québec assumerait une part proportionnelle (~20 %), mais récupérerait aussi une part proportionnelle des actifs fédéraux. Précédents historiques montrent que les États négocient des arrangements.", "sources": ["Observatoire québécois | https://www.observatoire-souverainete.com/", "FMI | https://www.imf.org/"]},
  {"id": 5, "category": "Pensions & Retraites", "claim": "« Les retraités québécois perdraient leur pension de retraite »", "context": "Crainte que les droits acquis (CPP/RRQ) disparaissent.", "rebuttal": "Le Régime de rentes du Québec (RRQ) est DÉJÀ géré par le Québec depuis 1966. Les cotisations restent à Québec. En indépendance, le Québec continuerait le RRQ sans interruption.", "sources": ["RRQ | https://www.rrq.gouv.qc.ca/", "CDPQ | https://www.cdpq.com/"]},
  {"id": 6, "category": "Droits & Libertés", "claim": "« La Charte des droits disparaîtrait »", "context": "Crainte que l'indépendance signifie fin des protections légales.", "rebuttal": "Un Québec souverain aurait sa propre charte constitutionnelle. La Charte québécoise (1975) est antérieure à la Charte canadienne (1982). Autres États souverains protègent les droits.", "sources": ["Charte québécoise | https://www.quebec.ca/", "ONU droits | https://www.ohchr.org/"]},
  {"id": 7, "category": "Emploi & Chômage", "claim": "« L'indépendance causerait une augmentation massive du chômage »", "context": "Prédiction d'effondrement de l'emploi post-référendaire.", "rebuttal": "Données post-référendum 1995 montrent que le Québec a continué sa croissance d'emploi. Micro-États (Luxembourg, Islande) connaissent des taux de chômage parmi les plus bas.", "sources": ["Statcan | https://www.statcan.gc.ca/", "OCDE | https://www.oecd.org/"]},
  {"id": 8, "category": "Commerce International", "claim": "« Un Québec indépendant ne pourrait pas commercer avec le Canada »", "context": "Argument que les tarifs détruiraient le commerce.", "rebuttal": "Les échanges commerciaux entre États indépendants sont la norme (Canada-USA, Suisse-UE). Un accord Québec-Canada serait inévitable. Intérêt économique pousse au libre-échange.", "sources": ["OMC | https://www.wto.org/", "CIRANO | https://www.cirano.qc.ca/"]},
  {"id": 9, "category": "Ressources Naturelles", "claim": "« Le Québec n'a pas assez de ressources naturelles »", "context": "Minimisation des actifs québécois.", "rebuttal": "Québec a des ressources MAJEURES: hydroélectricité (1er producteur nord-américain), forêts boréales (~27% couvert forestier Canada), minéraux (lithium, cobalt), eaux douces (15% réserves mondiales).", "sources": ["Hydro-Québec | https://www.hydroquebec.com/", "Ressources naturelles Canada | https://www.rncan.gc.ca/"]},
  {"id": 10, "category": "Immigration & Démographie", "claim": "« Le Québec perdrait le contrôle de l'immigration »", "context": "Crainte d'une immigration incontrôlée.", "rebuttal": "Québec contrôle DÉJÀ son immigration via Accord 1991. Sélection des immigrants: Québec. Politique intégration: Québec. Taux immigration stable 1% population/an.", "sources": ["Immigration Québec | https://www.immigration-quebec.gouv.qc.ca/", "ISQ | https://www.stat.gouv.qc.ca/"]},
  {"id": 11, "category": "Infrastructure", "claim": "« Le Québec ne pourrait pas maintenir ses infrastructures »", "context": "Dépendance perçue aux programmes fédéraux.", "rebuttal": "Québec contribue davantage aux programmes fédéraux qu'il ne reçoit. Provinces australiennes gèrent leurs infrastructures. Québec aurait les revenus nécessaires.", "sources": ["Infrastructure Canada | https://www.infrastructure.gc.ca/", "Transports Québec | https://www.transports.gouv.qc.ca/"]},
  {"id": 12, "category": "Langue & Culture", "claim": "« La culture québécoise perdrait en richesse »", "context": "Argument que l'indépendance l'appauvrierait.", "rebuttal": "INVERSE VRAI. France protège culture via subventions. Québec souverain pourrait subventionner TV française, cinéma, musique, édition. Réseau diffusion global.", "sources": ["MCC France | https://www.culture.gouv.fr/", "BAKOM Suisse | https://www.bakom.admin.ch/"]},
  {"id": 13, "category": "Gouvernance", "claim": "« Le fédéral est plus transparent que Québec »", "context": "Argument que le gouvernement central est plus redevable.", "rebuttal": "Transparency International 2023: Canada #12, Suisse #6, Nouvelle-Zélande #1. Petit gouvernement = plus transparent. Scandales (SNC-Lavalin) montrent Ottawa cache aussi.", "sources": ["Transparency International | https://www.transparency.org/"]},
  {"id": 14, "category": "Gouvernance", "claim": "« L'indépendance mènerait à l'instabilité gouvernementale »", "context": "Peur de coalitions fragiles.", "rebuttal": "PAYS STABLES: Suisse coalitions depuis 1959. Belgique coalitions multilingues. Suède coalitions depuis 1976. Irlande coalitions. Coalitions FORCENT compromis = gouvernance meilleure.", "sources": ["OCDE | https://www.oecd.org/", "IPU | https://www.ipu.org/"]},
  {"id": 15, "category": "Géopolitique", "claim": "« Le Québec n'aurait aucun poids diplomatique »", "context": "Argument que la souveraineté marginaliserait le Québec.", "rebuttal": "Petits États (Luxembourg 0.67M, Malte 0.53M) ont poids diplomatique considérable à l'ONU, l'UE. Québec (8.5M) serait bien plus grand. Pourrait siéger à l'ONU, Francophonie, OMC.", "sources": ["Ministère Affaires étrangères Suisse | https://www.eda.admin.ch/", "ONU | https://www.un.org/"]},
  {"id": 16, "category": "Innovation & Technologie", "claim": "« Le secteur tech québécois dépend du fédéral »", "context": "Minimisation des innovations québécoises.", "rebuttal": "Québec leader en jeux vidéo (Ubisoft, Square Enix), IA (Mila), aérospatiale. Compétitifs MALGRÉ fédéral. Souveraineté = réduire taxes, allocations R&D flexibles.", "sources": ["Mila | https://mila.quebec/", "Ubisoft | https://www.ubisoft.com/"]},
  {"id": 17, "category": "Électricité & Énergie", "claim": "« Le Québec ne pourrait pas exporter son électricité »", "context": "Argument que marchés USA/Canada dépendent du fédéral.", "rebuttal": "Hydro-Québec exporte déjà vers USA via contrats directs, pas Ottawa. États américains négocient directement l'électricité. Québec aurait accès à marchés plus grands.", "sources": ["Hydro-Québec | https://www.hydroquebec.com/", "NEISO | https://www.neiso.com/"]},
  {"id": 18, "category": "Éducation", "claim": "« Les universités québécoises perdraient leurs accréditations internationales »", "context": "Peur que les diplômes ne soient reconnus.", "rebuttal": "Les universités québécoises (McGill, Université de Montréal) sont reconnues mondialement. L'accréditation est basée sur la qualité de recherche, pas sur le statut politique. Les universités suisses, belges sont aussi reconnues.", "sources": ["Association Universités Canada | https://www.univcan.ca/", "QS Rankings | https://www.topuniversities.com/"]},

let allDebunks = [...debunks];
let filteredDebunks = [...debunks];

function initApp() {
  renderStats();
  renderSidebar();
  renderDebunks();
  populateCategoryFilter();
}

function renderStats() {
  const statsDiv = document.getElementById('stats');
  const categories = new Set(allDebunks.map(d => d.category)).size;
  const sources = allDebunks.reduce((sum, d) => sum + d.sources.length, 0);
  
  statsDiv.innerHTML = `
    <div class="stat-card">
      <div class="stat-number">${allDebunks.length}</div>
      <div class="stat-label">Débunks</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${categories}</div>
      <div class="stat-label">Catégories</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${sources}</div>
      <div class="stat-label">Sources</div>
    </div>
  `;
}

function renderSidebar() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const sidebar = document.getElementById('sidebar');
  
  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-title">Catégories</div>
      <button class="sidebar-btn active" onclick="filterBySidebar(null)">Tous</button>
      ${categories.map(cat => `<button class="sidebar-btn" onclick="filterBySidebar('${cat}')">${cat}</button>`).join('')}
    </div>
  `;
}

function populateCategoryFilter() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const select = document.getElementById('categoryFilter');
  select.innerHTML = '<option value="">Toutes les catégories</option>' + 
    categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  select.addEventListener('change', filterDebunks);
}

function filterBySidebar(cat) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('categoryFilter').value = cat || '';
  filterDebunks();
}

function filterDebunks() {
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  
  filteredDebunks = allDebunks.filter(d => {
    const matchCat = !category || d.category === category;
    const matchSearch = !search || d.claim.toLowerCase().includes(search) || d.category.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  
  renderDebunks();
}

function renderDebunks() {
  const list = document.getElementById('debunk-list');
  const empty = document.getElementById('empty-state');
  
  if (filteredDebunks.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = '<h2>Aucun résultat</h2><p>Essayez une autre recherche</p>';
    return;
  }
  
  list.style.display = 'grid';
  empty.style.display = 'none';
  
  list.innerHTML = filteredDebunks.map(d => `
    <div class="card" onclick="showDetail(${d.id})">
      <div class="badge">${d.category}</div>
      <h3 class="card-title">${d.claim}</h3>
      <div class="card-meta">📌 ${d.sources.length} source${d.sources.length > 1 ? 's' : ''}</div>
    </div>
  `).join('');
}

function showDetail(id) {
  const debunk = allDebunks.find(d => d.id === id);
  if (!debunk) return;
  
  document.getElementById('debunk-list').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  
  const detail = document.getElementById('detail-view');
  detail.innerHTML = `
    <button class="btn-secondary" onclick="backToList()">← Retour aux résultats</button>
    
    <div class="detail-header">
      <span class="badge">${debunk.category}</span>
      <h1>${debunk.claim}</h1>
    </div>
    
    <div class="detail-section">
      <h3>📍 Contexte</h3>
      <p>${debunk.context}</p>
    </div>
    
    <div class="detail-section">
      <h3>✅ Réfutation</h3>
      <p>${debunk.rebuttal}</p>
    </div>
    
    <div class="detail-section">
      <h3>📚 Sources</h3>
      <ul class="sources-list">
        ${debunk.sources.map(s => {
          const parts = s.split(' | ');
          const title = parts[0] || 'Source';
          const url = parts[1] || '';
          return `<li>
            <strong>${title}</strong>
            ${url ? `<a href="${url}" target="_blank" rel="noopener">🔗 lien</a>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </div>
    
    <div style="display: flex; gap: 1rem;">
      <button class="btn-secondary" onclick="openEditModal(${id})">Éditer</button>
      <button class="btn-secondary" onclick="deleteDebunk(${id})" style="color: #d32f2f;">Supprimer</button>
    </div>
  `;
  detail.classList.add('show');
}

function backToList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('debunk-list').style.display = 'grid';
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Ajouter un débunk';
  document.getElementById('form-category').value = '';
  document.getElementById('form-claim').value = '';
  document.getElementById('form-context').value = '';
  document.getElementById('form-rebuttal').value = '';
  document.getElementById('form-sources').value = '';
  document.getElementById('modal').dataset.editId = '';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const debunk = allDebunks.find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Éditer ce débunk';
  document.getElementById('form-category').value = debunk.category;
  document.getElementById('form-claim').value = debunk.claim;
  document.getElementById('form-context').value = debunk.context;
  document.getElementById('form-rebuttal').value = debunk.rebuttal;
  document.getElementById('form-sources').value = debunk.sources.join('\n');
  document.getElementById('modal').dataset.editId = id;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function openImportModal() {
  document.getElementById('import-modal').classList.add('open');
  document.getElementById('import-json').value = '';
  document.getElementById('import-file').value = '';
  document.getElementById('import-result').style.display = 'none';
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('open');
}

function processImport() {
  const jsonText = document.getElementById('import-json').value.trim();
  const fileInput = document.getElementById('import-file');
  const resultDiv = document.getElementById('import-result');
  
  if (jsonText) {
    importFromJson(jsonText, resultDiv);
  } else if (fileInput.files.length > 0) {
    importFromFile(fileInput.files[0], resultDiv);
  } else {
    showImportResult(resultDiv, 'error', 'Colle du JSON ou upload un fichier');
  }
}

function importFromJson(jsonText, resultDiv) {
  try {
    const newDebunks = JSON.parse(jsonText);
    mergeDebunks(newDebunks, resultDiv);
  } catch (err) {
    showImportResult(resultDiv, 'error', `Erreur JSON: ${err.message}`);
  }
}

function importFromFile(file, resultDiv) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const newDebunks = JSON.parse(e.target.result);
      mergeDebunks(newDebunks, resultDiv);
    } catch (err) {
      showImportResult(resultDiv, 'error', `Erreur fichier: ${err.message}`);
    }
  };
  reader.readAsText(file);
}

function mergeDebunks(newDebunks, resultDiv) {
  if (!Array.isArray(newDebunks)) {
    showImportResult(resultDiv, 'error', 'Format invalide: doit être un array JSON');
    return;
  }
  
  const existing = [...allDebunks];
  const existingIds = new Set(existing.map(d => d.id));
  const toAdd = newDebunks.filter(d => !existingIds.has(d.id));
  
  if (toAdd.length === 0) {
    showImportResult(resultDiv, 'error', 'Aucun nouveau débunk à ajouter (doublons détectés)');
    return;
  }
  
  const updated = [...existing, ...toAdd];
  allDebunks = updated;
  localStorage.setItem('debunks', JSON.stringify(updated));
  
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  
  showImportResult(resultDiv, 'success', 
    `✅ Import réussi! ${toAdd.length} débunks ajoutés. Total: ${updated.length}`
  );
  
  setTimeout(() => {
    closeImportModal();
  }, 2000);
}

function showImportResult(resultDiv, type, message) {
  resultDiv.style.display = 'block';
  resultDiv.className = type === 'success' ? 'import-success' : 'import-error';
  resultDiv.textContent = message;
}

function saveDebunk() {
  const category = document.getElementById('form-category').value.trim();
  const claim = document.getElementById('form-claim').value.trim();
  const context = document.getElementById('form-context').value.trim();
  const rebuttal = document.getElementById('form-rebuttal').value.trim();
  const sourceText = document.getElementById('form-sources').value.trim();
  
  if (!category || !claim || !rebuttal) {
    alert('Remplissez: catégorie, affirmation et réfutation');
    return;
  }
  
  const sources = sourceText.split('\n').filter(s => s.trim());
  const editId = document.getElementById('modal').dataset.editId;
  
  if (editId) {
    const idx = allDebunks.findIndex(d => d.id == editId);
    allDebunks[idx] = { ...allDebunks[idx], category, claim, context, rebuttal, sources };
  } else {
    allDebunks.push({
      id: Math.max(...allDebunks.map(d => d.id), 0) + 1,
      category, claim, context, rebuttal, sources
    });
  }
  
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  closeModal();
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

function deleteDebunk(id) {
  if (!confirm('Supprimer ce débunk?')) return;
  allDebunks = allDebunks.filter(d => d.id !== id);
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

document.getElementById('search').addEventListener('input', filterDebunks);

initApp();
</script>

</body>
</html>
