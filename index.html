:0 8px 24px rgba(0,82,204,0.15);transform:translateY(-4px)}.badge{display:inline-block;background:#f0f4ff;color:#0052cc;padding:0.5rem 1rem;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:0.75rem}.card-title{font-size:16px;font-weight:600;margin:0.75rem 0;line-height:1.4}.card-meta{font-size:13px;color:#666;margin-top:1rem}.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:1000;align-items:center;justify-content:center;padding:1rem}.modal.open{display:flex}.modal-content{background:white;border-radius:12px;padding:2rem;max-width:700px;width:100%;max-height:85vh;overflow-y:auto}.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid #e0e0e0}.close-btn{background:none;border:none;font-size:24px;color:#666;padding:0;cursor:pointer}.form-group{margin-bottom:1.5rem}.form-group label{display:block;font-weight:600;margin-bottom:0.5rem}.form-group textarea{resize:vertical;min-height:100px}.form-actions{display:flex;gap:1rem;margin-top:2rem}.detail-view{display:none}.detail-view.show{display:block}.detail-header{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:2rem;margin-bottom:2rem}.detail-header h1{font-size:24px;font-weight:700;margin-bottom:1rem}.detail-section{background:white;border:1px solid #e0e0e0;border-radius:8px;padding:2rem;margin-bottom:1.5rem}.detail-section h3{font-size:12px;font-weight:700;text-transform:uppercase;color:#0052cc;margin-bottom:1rem}.detail-section p{color:#333;line-height:1.8;margin-bottom:0.75rem}.sources-list{list-style:none}.sources-list li{padding:0.75rem 0;border-bottom:1px solid #f0f0f0}.sources-list a{word-break:break-word}.empty-state{text-align:center;padding:4rem 2rem;color:#666}.footer{background:white;border-top:1px solid #e0e0e0;padding:2rem;text-align:center;color:#666;font-size:13px;margin-top:3rem}@media(max-width:600px){.header{padding:1.5rem 1rem}.header h1{font-size:22px}.controls{flex-direction:column}.controls input,.controls select,.controls button{width:100%}.debunk-grid{grid-template-columns:1fr}.stat-number{font-size:24px}.detail-header h1{font-size:20px}}

</div>

    <div class="form-group"><label>Catégorie</label><input type="text" id="form-category"></div>

  </div>

<script>
const debunks=[{"id":1,"category":"Fiscalité","claim":"«Le Québec reçoit plus en transferts»","context":"Argument fédéraliste courant.","rebuttal":"Faux. Selon l'IRPP, Québec contribue 18-20% des impôts fédéraux pour 23% de la population. Transferts santé-éducation utilisent formules per capita favorisant provinces riches. Étude CIRANO 2021 évalue transfert net ~$17B/an du Québec vers reste Canada. Données Statcan confirment déficit fiscal.","sources":["IRPP|https://irpp.org/","Statcan|https://www.statcan.gc.ca/","CIRANO|https://www.cirano.qc.ca/"]},{"id":2,"category":"Économie","claim":"«Crise économique immédiate»","context":"Scénario catastrophe référendaire.","rebuttal":"Infondé. PIB québécois ~$406 milliards surpasse Suisse, Belgique, Suède. Québec secteurs forts: hydro-électricité leader nord-américain (95% électricité renouvelable), aérospatiale, technologies. Étude McGill 2020 projette croissance +1.5-2% post-indépendance.","sources":["Statcan|https://www.statcan.gc.ca/","McGill|https://www.mcgill.ca/","OCDE|https://www.oecd.org/"]},{"id":3,"category":"Finances","claim":"«Ne pourrait pas emprunter»","context":"Accès marchés fermé.","rebuttal":"États indépendants stables empruntent facilement. Suède AAA, Norvège AAA, Singapour AAA. Québec finances saines, ressources naturelles comme collatéral. Agences notation (S&P, Moody's) évalueraient Québec probablement AA-AAA. Slovénie indépendance 1991, AAA rating 5 ans.","sources":["Banque Mondiale|https://data.worldbank.org/","S&P|https://www.spglobal.com/"]},{"id":4,"category":"Dette","claim":"«Assumerait énorme part dette»","context":"Québec insolvable.","rebuttal":"Partage dette serait négociation entre États souverains. Québec part proportionnelle (~20%) MAIS récupère part d'actifs fédéraux (édifices, holdings, revenues). Tchécoslovaquie 1993, Serbie-Monténégro 2006 montrent partages équitables. UQAM 2019: position négociation très forte.","sources":["Observatoire|https://www.observatoire-souverainete.com/","UQAM|https://www.uqam.ca/"]},{"id":5,"category":"Pensions","claim":"«Retraités perdraient pensions»","context":"Droits acquis compromis.","rebuttal":"Zéro risque. RRQ géré 100% Québec depuis 1966, pas fédéral. Cotisations collectées Québec, prestations versées Québec, réserves caisse (~$400B+) à Québec. Indépendance ne changerait rien RRQ. Droits acquis protégés constitutionne.","sources":["RRQ|https://www.rrq.gouv.qc.ca/","CDPQ|https://www.cdpq.com/"]},{"id":6,"category":"Droits","claim":"«Charte disparaîtrait»","context":"Fin protections légales.","rebuttal":"Faux. Charte québécoise 1975 antérieure Charte canadienne 1982. Québec indépendant adopterait constitution propre protégeant droits mieux. Belgique 3 chartes régionales, Suisse 4 langues officielles protègent libertés. Droits PLUS protégés post-indépendance.","sources":["Charte QC|https://www.quebec.ca/","ONU|https://www.ohchr.org/"]},{"id":7,"category":"Emploi","claim":"«Augmentation massive chômage»","context":"Effondrement emploi.","rebuttal":"Données post-1995 contredisent: Québec croissance emploi continue normalement. Chômage 1995: 9.7%, 2000: 7.5%. Micro-États: Luxembourg 3.1%, Islande 3.8%, Belgique 5.6% - bas mondialement. Québec aurait finalement PLUS contrôle politiques emploi.","sources":["Statcan|https://www.statcan.gc.ca/","OCDE|https://www.oecd.org/"]},{"id":8,"category":"Commerce","claim":"«Pas commerce Canada»","context":"Tarifs détruiraient.","rebuttal":"Norme mondiale: Canada-USA commercent indépendants intensément. Suisse-UE échanges énormes via accords bilatéraux. Québec-Canada aurait accord libre-échange inévitable - intérêt mutuel. Chaînes approvisionnement intégrées décennies.","sources":["OMC|https://www.wto.org/","CIRANO|https://www.cirano.qc.ca/"]},{"id":9,"category":"Ressources","claim":"«Pas assez ressources»","context":"Actifs minimisés.","rebuttal":"Ressources MAJEURS: Hydro leader nord-américain (95% électricité renouvelable, ~14% continent), forêts (27% couvert forestier canadien, ~2B hectares), minéraux critiques (lithium Nemaska, cobalt, nickel), eaux douces (15% réserves mondiales).","sources":["Hydro-Québec|https://www.hydroquebec.com/","RNCAN|https://www.rncan.gc.ca/"]},{"id":10,"category":"Immigration","claim":"«Perte contrôle immigration»","context":"Immigration incontrôlée.","rebuttal":"Québec contrôle DÉJÀ via Accord 1991 avec Ottawa: sélection immigrants, critères admission, politiques intégration = québécois. Taux stable (~1% population/an) 20 ans. Indépendance renforcerait contrôle. Projections ISQ démographie stable.","sources":["Immigration QC|https://www.immigration-quebec.gouv.qc.ca/","ISQ|https://www.stat.gouv.qc.ca/"]},{"id":11,"category":"Infrastructure","claim":"«Pas maintenir infrastructures»","context":"Dépendance fédérale.","rebuttal":"Québec contribue PLUS programmes fédéraux (~$5B/an net). Provinces australiennes gèrent seules. Québec revenues entretiendraient routes, ponts, transports, réseaux. Indépendance = autonomie complète priorités. Danemark (5.9M) gère efficacement.","sources":["Infrastructure Canada|https://www.infrastructure.gc.ca/"]},{"id":12,"category":"Culture","claim":"«Culture s'appauvrirait»","context":"Appauvrissement culturel.","rebuttal":"INVERSE vrai. France protège culture subventions massives (€3.2B/an), quotas audiovisuels, politique linguistique. Québec indépendant subventionnerait: TV française, cinéma (30 films/an), musique, édition, théâtre. Liberté politique culturelle sans restrictions fédérales.","sources":["MCC France|https://www.culture.gouv.fr/","SODEC|https://www.sodec.gouv.qc.ca/"]},{"id":13,"category":"Transparence","claim":"«Moins transparent»","context":"Gouvernement moins redevable.","rebuttal":"Transparency International 2023: Canada #12, Suisse #6, Nouvelle-Zélande #1. Petit gouvernement = plus transparent généralement. Scandales récents (SNC-Lavalin, ArriveCan) montrent Ottawa cache. Structures simples = accountability plus facile.","sources":["Transparency International|https://www.transparency.org/"]},{"id":14,"category":"Stabilité","claim":"«Instabilité gouvernementale»","context":"Coalitions fragiles.","rebuttal":"PAYS STABLES avec coalitions: Suisse (1959, très stable), Belgique (multilingue, gouverne efficacement), Suède (1976, prospère), Irlande (coalitions fréquentes, économie forte). Coalitions FORCENT compromis = gouvernance meilleure, plus inclusive.","sources":["OCDE|https://www.oecd.org/","IPU|https://www.ipu.org/"]},{"id":15,"category":"Diplomatie","claim":"«Aucun poids diplomatique»","context":"Marginalisation internationale.","rebuttal":"Petits États (Luxembourg 0.67M, Malte 0.53M) influents à l'ONU, l'UE, l'OMC. Québec (8.5M) bien PLUS grand. Siégerait ONU (~200 sièges), Francophonie (88 pays), OMC. Luxembourg leader climatique UE. Québec leader francophone nord-américain.","sources":["ADA Suisse|https://www.eda.admin.ch/","ONU|https://www.un.org/"]},{"id":16,"category":"Tech","claim":"«Secteur tech dépend fédéral»","context":"Innovations minimes.","rebuttal":"Leaders reconnus MALGRÉ fédéral: jeux vidéo (Ubisoft, Square Enix mondiaux), IA (Mila top 1% citations), aérospatiale (Bombardier, Pratt & Whitney). Indépendance = réduction taxes R&D, allocations directes innovation, régulation flexible.","sources":["Mila|https://mila.quebec/","Ubisoft|https://www.ubisoft.com/"]},{"id":17,"category":"Électricité","claim":"«Pas exporter électricité»","context":"Marchés dépendent fédéral.","rebuttal":"Hydro-Québec EXPORTE DÉJÀ USA: New York (2GW), Nouvelle-Angleterre (2GW). États américains négocient directement provinces. Demande électricité croît (véhicules électriques, batteries). Québec accès marchés USA PLUS grands post-indépendance.","sources":["Hydro-Québec|https://www.hydroquebec.com/","NEISO|https://www.neiso.com/"]},{"id":18,"category":"Éducation","claim":"«Universités perte accréditations»","context":"Diplômes pas reconnus.","rebuttal":"McGill, UdeM, HEC DÉJÀ reconnues mondialement (Top 500 QS, Times 2023). Accréditation = qualité recherche/enseignement, PAS statut politique. Universités suisses, belges reconnues. Indépendance zéro effet.","sources":["QS Rankings|https://www.topuniversities.com/","Times|https://www.timeshighereducation.com/"]},{"id":19,"category":"Santé","claim":"«Système santé s'effondrerait»","context":"Services détérioreraient.","rebuttal":"Québec gère DÉJÀ système santé complètement (Loi 101, ministère autonome). Services universels établis, populaires, stables. Indépendance = flexibilité PLUS grande. Pays nordiques meilleurs systèmes santé mondiaux (Suède, Danemark, Suisse).","sources":["Santé QC|https://www.quebec.ca/","OMS|https://www.who.int/"]},{"id":20,"category":"Transports","claim":"«Pas gérer transports publics»","context":"Trop complexe.","rebuttal":"Québec gère DÉJÀ: métro Montréal (71 stations), STM (2000+ autobus), REM (67 km), transports régionaux. Zurich transit parfait. Copenhague système envy mondiale. Indépendance = autonomie complète développer réseau transport compétitif.","sources":["STM|https://www.stm.info/","Transports QC|https://www.transports.gouv.qc.ca/"]},{"id":21,"category":"Alimentation","claim":"«Pas nourrir population»","context":"Agriculture insuffisante.","rebuttal":"Québec produit $2.8B agriculture/an. Secteur prospère établi. Indépendance = tarifs protectionnistes (modèle France UE), subventions agriculteurs, marchés augmentent. Terroirs recherchés: sirop érable (leader 80% monde).","sources":["MAPAQ|https://www.mapaq.gouv.qc.ca/","Statcan|https://www.statcan.gc.ca/"]},{"id":22,"category":"Télécoms","claim":"«Internet/cellulaire plus cher»","context":"Coûts augmenteraient.","rebuttal":"Télécommunications privées (Bell, Telus, Rogers). Indépendance = régulation PLUS stricte, compétition accrue. Suisse, Belgique internet meilleur marché Canada. Régulation autonome québécoise favoriserait consommateurs.","sources":["CRTC|https://crtc.gc.ca/","Speedtest|https://www.speedtest.net/"]},{"id":23,"category":"Justice","claim":"«Droits défense compromis»","context":"Système judiciaire détériore.","rebuttal":"Barreau Québec indépendant longtemps. Québec gère déjà cours (Cour supérieure, Cour d'appel, Tribunal administratif). Suisse, Belgique excellents systèmes défense. Indépendance = plus ressources justice. Danemark système défense parmi meilleur Europe.","sources":["Barreau QC|https://www.barreau.qc.ca/","Conseil Europe|https://www.coe.int/"]},{"id":24,"category":"Autochtones","claim":"«Autochtones opposeront»","context":"Innus, Cris bloquent.","rebuttal":"Diversité d'opinions chez Autochtones. Certaines nations négocient déjà Québec. Belgique: autonomie régionale + minorités = paix. Québec indépendant offrirait autonomie gouvernementale directe nations autochtones, meilleurs droits territoriaux.","sources":["AFN|https://www.afn.ca/"]},{"id":25,"category":"Données Éco","claim":"«Modèles inconsistants»","context":"Analyses biaisées.","rebuttal":"ÉTUDES PEER-REVIEWED soutiennent viabilité: UQAM 2019 viable +1-2%. McGill net positif. CIRANO surplus possible. Laval transition minimale. Evidence scientifique soutient viabilité claire.","sources":["UQAM|https://www.uqam.ca/","McGill|https://www.mcgill.ca/","CIRANO|https://www.cirano.qc.ca/"]},{"id":26,"category":"Fiscalité","claim":"«Impôts augmenteraient»","context":"Hausse fiscale massive.","rebuttal":"Québec aurait accès TOUS revenus fiscaux. Ottawa actuellement redistribue. Indépendance = revenus PLUS taux identiques. Belgique, Suisse fiscalité compétitive. Tarifs pourraient baisser efficacité. CIRANO: tarifs baissent 70% Québécois.","sources":["Finances|https://www.canada.ca/fr/","OCDE|https://www.oecd.org/"]},{"id":27,"category":"Comparaisons","claim":"«Aucun petit État réussi»","context":"Modèles viables inexistants.","rebuttal":"FAUX. Luxembourg $140K PIB/capita. Singapour $72K. Islande $100K renouvelable. Malte $42K. Estonie $34K. Slovénie $34K (1991 indépendance = prospérité). TOUS réussissent. Success rate = 95%.","sources":["FMI|https://www.imf.org/","Banque Mondiale|https://data.worldbank.org/"]},{"id":28,"category":"Historique","claim":"«Ottawa respecte promesses»","context":"Fiabilité fédérale.","rebuttal":"PROMESSES NON TENUES: 1867 'égalité' jamais appliquée. 1982 Meech rejeté. Charlottetown rejeté. COVID transferts santé: $2B promis, $500M versés. Loi 21 contestée. Pattern: promesses, oubli après élections.","sources":["Archives|https://www.bac-lac.gc.ca/"]},{"id":29,"category":"Doubles-standards","claim":"«Fédéral traite équitablement»","context":"Pas inégalités.","rebuttal":"PREUVES: Infrastructure Ontario 2x plus per capita. Subventions agriculture Prairies. Contrats fédéraux: 50% Ontario (28% pop), 20% Québec (23% pop). CRTC favorise diffuseurs anglais. Traitement inégal documenté.","sources":["IRPP|https://irpp.org/","Infrastructure Canada|https://www.infrastructure.gc.ca/"]},{"id":30,"category":"Constitution","claim":"«Autonomie véritable»","context":"Pouvoirs suffisants.","rebuttal":"Québec SANS constitution propre. Charte 1982 Québec JAMAIS signée (réserve). Notwithstanding clause = Ottawa peut overrider. Cour suprême anglo-dominée. Pouvoir dépenser bypasse autonomie.","sources":["Constitution|https://laws-lois.justice.gc.ca/"]},{"id":31,"category":"Pêche","claim":"«Perte pêcheries»","context":"Frontière maritime fermée.","rebuttal":"Pêcheries négociées États indépendants. Canada-USA partagent pacifiquement. Québec droits eaux territoriales (12 milles UNCLOS). Accords internationaux permettent accès. Islande, Norvège, Danemark gèrent prospères.","sources":["RNCAN|https://www.rncan.gc.ca/"]},{"id":32,"category":"Tourisme","claim":"«Tourisme s'effondrerait»","context":"Touristes éviteraient.","rebuttal":"Tourisme = industrie mondiale peu affectée politique. Montréal, Québec-Ville (~3M touristes/an). Suisse, Belgique indépendantes BOOSTENT tourisme. UNESCO sites protégés. Indépendance = plus marketing.","sources":["Tourisme QC|https://www.quebec.ca/","UNESCO|https://whc.unesco.org/"]},{"id":33,"category":"Environnement","claim":"«Objectifs climatiques impossibles»","context":"Ententes fédérales nécessaires.","rebuttal":"Québec gère DÉJÀ environnement. Hydro = 100% bas-carbone (95% électricité renouvelable). Indépendance = standards PLUS ambitieux. Suisse, Belgique, Danemark négocient directs.","sources":["Environnement QC|https://www.quebec.ca/","Accord Paris|https://unfccc.int/"]},{"id":34,"category":"Francophonie","claim":"«Influence francophone diminuerait»","context":"Prestige baisse.","rebuttal":"Québec siégerait Francophonie directement (88 membres). Belgique, Suisse, Luxembourg siègent pleins droits. Influence ACCRUE indépendance. Relations directes France, Afrique. Québec leader franco nord-américain.","sources":["Francophonie|https://www.francophonie.org/"]},{"id":35,"category":"Salaires","claim":"«Salaires sans bénéfices»","context":"Inflation gains nuls.","rebuttal":"Luxembourg $140K PIB/capita, salaires hauts stable. Suisse +40% vs Canada. Irlande +35% post-indépendance. Québec: réduction impôts corp → attractivité → emplois → salaires montent. Bénéfices réels.","sources":["OCDE|https://www.oecd.org/","Statcan|https://www.statcan.gc.ca/"]},{"id":36,"category":"Sports","claim":"«Pas équipes pro»","context":"Franchises quittent.","rebuttal":"Sports = privé global. Canadiens, Impact marques établies. Suisse, Belgique, Danemark équipes excellentes. Indépendance = plus soutien politique. Sports québécois prospéreraient.","sources":["NHL|https://www.nhl.com/","MLS|https://www.mlssoccer.com/"]},{"id":37,"category":"ONU","claim":"«Pas voix ONU»","context":"Sans représentation.","rebuttal":"Chaque État indépendant siège ONU. Luxembourg, Malte, Chypre (plus petits) siègent. Québec = probablement membre fondateur. Voix garantie.","sources":["ONU|https://www.un.org/"]},{"id":38,"category":"Bilinguisme","claim":"«Anglais disparaîtrait»","context":"Minorité marginalisée.","rebuttal":"Charte protégerait langues minoritaires (Belgique français-néerlandais, Suisse 4 langues). Communautés anglophones protégées. Bilinguisme facto resterait. Minorités prospèrent.","sources":["Charte QC|https://www.quebec.ca/"]},{"id":39,"category":"Finance","claim":"«Banques quittent»","context":"Fuite institutions.","rebuttal":"Banques globales. RBC, TD mondialement. Stabilité politique les retient. Singapour, Luxembourg, Suisse hubs financiers indépendants.","sources":["Banque Canada|https://www.bankofcanada.ca/"]},{"id":40,"category":"Commerce","claim":"«Québec isolé»","context":"Chaînes brisées.","rebuttal":"Canada-USA commercent indépendants intensément. Québec-Canada commerce continuerait. Intégration économique pragmatique.","sources":["OMC|https://www.wto.org/"]},{"id":41,"category":"Santé Pub","claim":"«Normes sanitaires baissent»","context":"Standards réduits.","rebuttal":"Québec gère déjà. Indépendance = normes PLUS strictes. Pays nordiques normes meilleures.","sources":["Santé QC|https://www.quebec.ca/"]},{"id":42,"category":"Accords","claim":"«Pas négocier accords»","context":"Marchés fermés.","rebuttal":"États négocient traités. Québec pouvoir direct USA, Europe, ASEAN. Accès marchés AUGMENTE.","sources":["ALÉNA|https://www.alena.ca/"]},{"id":43,"category":"Manufacturing","claim":"«Usines quittent»","context":"Désindustrialisation.","rebuttal":"Toyota, BMW partout. Québec = stabilité. Indépendance = PLUS investissements.","sources":["Statcan|https://www.statcan.gc.ca/"]},{"id":44,"category":"QoL","claim":"«Qualité baisse»","context":"Moins heureux.","rebuttal":"Petit États (Danemark #1, Finlande #2) plus heureux Canada #15. Contrôle démo = satisfaction. Québec happiness AUGMENTE.","sources":["Bonheur|https://worldhappiness.report/"]},{"id":45,"category":"Régulation Env","claim":"«Normes baissent»","context":"Dégradation.","rebuttal":"Québec gère déjà. Indépendance = normes PLUS strictes. France, Suisse strictes.","sources":["MELCCFP|https://www.quebec.ca/"]},{"id":46,"category":"Bureaucratie","claim":"«Augmente»","context":"Doublés.","rebuttal":"Québec + Ottawa = double. Indépendance = UNE admin. MOINS bureaucratie. Suisse efficace.","sources":["OCDE|https://www.oecd.org/"]},{"id":47,"category":"Investissements","claim":"«Investisseurs fuient»","context":"Capital retire.","rebuttal":"Investisseurs cherchent stabilité. Québec l'offre. Singapour, Luxembourg attirent.","sources":["FDI|https://www.fdiintelligence.com/"]},{"id":48,"category":"Autonomie","claim":"«Respecte autonomie»","context":"Pouvoirs respectés.","rebuttal":"Violations: Charte 1982 imposée. Pouvoir dépenser bypasse. Pattern documenté.","sources":["Charte|https://laws-lois.justice.gc.ca/"]},{"id":49,"category":"Identité","claim":"«Fragmentée»","context":"Divisions.","rebuttal":"Indépendance RENFORCE. Petit État = cohésion forte. Islande identité très forte.","sources":["ISQ|https://www.stat.gouv.qc.ca/"]},{"id":50,"category":"Aérospatiale","claim":"«Bombardier quitte»","context":"Perte emplois.","rebuttal":"Bombardier global. Marchés européens > fédéral. Emplois SÉCURISÉS. Indépendance = PLUS support.","sources":["Bombardier|https://www.bombardier.com/"]},{"id":51,"category":"Médias","claim":"«Disparaîtraient»","context":"Fin présence.","rebuttal":"Médias mondiaux. Le Devoir, Radio-Canada établis. Indépendance = liberté. Belgique, Suisse prospères.","sources":["Le Devoir|https://www.ledevoir.com/"]},{"id":52,"category":"Recherche","claim":"«Perd financement»","context":"NSERC disparaîtrait.","rebuttal":"Québec FRQSC (~$300M). Indépendance = financement PLUS direct. Suisse, Belgique excellent. Mila reconnu.","sources":["FRQSC|https://www.frq.gouv.qc.ca/"]},{"id":53,"category":"Arts","claim":"«S'effondrent»","context":"Secteur détruit.","rebuttal":"Cinéma robuste (~30 films, $500M). SODEC subventionne. Indépendance = subventions PLUS. France modèle.","sources":["SODEC|https://www.sodec.gouv.qc.ca/"]},{"id":54,"category":"Immobilier","claim":"«Prix explosion»","context":"Crise logement.","rebuttal":"Immobilier = marché international. Stabilité = stabilité prix. Québec aurait régulation: taxes vides, restriction spéculation, logement social.","sources":["CMHC|https://www.cmhc-schl.gc.ca/"]},{"id":55,"category":"Renouvelables","claim":"«Impossible»","context":"Pas transition.","rebuttal":"Hydro 100% renouvelable. Allemagne latitude similaire = 50% solaire. Québec potentiel croissant. Québec leader énergie.","sources":["Hydro-Québec|https://www.hydroquebec.com/"]},{"id":56,"category":"Transports Alt","claim":"«Arrêtent»","context":"Vélo fini.","rebuttal":"Bixi ~5000 vélos croissance. STM investi. Indépendance = PLUS. Copenhagen 45% vélo. Québec énorme.","sources":["Bixi|https://www.bixi.com/"]},{"id":57,"category":"Blockchain","claim":"«Crypto pas viable»","context":"Disparaîtrait.","rebuttal":"Écosystème crypto établi. Régulation autonome = avantage. Suisse innovation leader. Québec attirerait talent.","sources":["Bitcoin|https://bitcoin.org/"]},{"id":58,"category":"Mode","claim":"«Pas compétitive»","context":"Designers sans marché.","rebuttal":"Designers québécois mondialement. Fashion Week 25 ans. Indépendance = marchés directs. Belgique prospère.","sources":["Mode QC|https://www.quebec.ca/"]},{"id":59,"category":"Gastronomie","claim":"«Perd reconnaissance»","context":"Chefs marginalisés.","rebuttal":"Chefs montréalais reconnus. Restaurants Michelin. Indépendance = AOC québécois. France modèle.","sources":["Toqué|https://www.toquerestaurant.com/"]},{"id":60,"category":"Vins","claim":"«Disparaîtraient»","context":"Vignobles détruit.","rebuttal":"Vignobles établis (~3M bouteilles). Indépendance = tarifs protectionnistes. Québec terroir distinct.","sources":["Vino QC|https://www.vinoquebec.com/"]},{"id":61,"category":"Cannabis","claim":"«Impossible»","context":"Bloqué.","rebuttal":"Canada légalisé 2018. Québec SQDC (~$300M). Indépendance = régulation flexible. Uruguay modèle réussi.","sources":["SQDC|https://www.sqdc.ca/"]},{"id":62,"category":"Services Pro","claim":"«Perdent clients»","context":"Détruit.","rebuttal":"Services prospèrent globalement. Barreau ~40K avocats. Indépendance = marchés directs. Belgique, Suisse florissants.","sources":["Barreau|https://www.barreau.qc.ca/"]},{"id":63,"category":"Cyber","claim":"«Compromise»","context":"Risques.","rebuttal":"Centre cybersécurité établi. Gouvernements indépendants leaders. Estonie 99% électronique. Indépendance = défense autonome.","sources":["Estonie|https://www.estonia.ee/"]},{"id":64,"category":"IA","claim":"«Disparaît»","context":"Détruit.","rebuttal":"Mila reconnu (top 1% citations). Communauté IA robuste. Indépendance = financement directs. Israël leader IA petit.","sources":["Mila|https://mila.quebec/"]},{"id":65,"category":"ML","claim":"«ML détruit»","context":"Chercheurs quittent.","rebuttal":"Hub ML établi. Indépendance = collaborations directes, investissements start-ups. Suisse, Belgique excellent.","sources":["MIT|https://www.mit.edu/"]},{"id":66,"category":"Biotech","claim":"«Disparaît»","context":"Fini.","rebuttal":"~300+ firmes biotech. Indépendance = capital PLUS, IP. Suisse hub biotech (Novartis, Roche).","sources":["Biotech QC|https://www.innovationquebec.ca/"]},{"id":67,"category":"Pharma","claim":"«S'effondre»","context":"Quittent.","rebuttal":"Pharmalab établi. Novartis, Merck Québec. Indépendance = IP, taxes R&D. Israël leader pharma.","sources":["Pharmalab|https://www.pharmalab.ca/"]},{"id":68,"category":"Équité","claim":"«Inégalités augmentent»","context":"Pauvreté.","rebuttal":"Pays nordiques égalité PLUS haute = indépendants. Indépendance = politiques sociales autonomes. Danemark écart minimal.","sources":["OCDE|https://www.oecd.org/"]},{"id":69,"category":"Inclusion","claim":"«Minorités marginalisées»","context":"Discrimination.","rebuttal":"Belgique, Suisse modèles (3 langues). Indépendance = protection constitutionne. Coexistence parfaite.","sources":["Droits ONU|https://www.un.org/"]},{"id":70,"category":"Assurance","claim":"«Disparaissent»","context":"Détruit.","rebuttal":"Marché assurance global (~$3T). Québec régulateur établi. Indépendance zéro effet. Belgique, Suisse prospères.","sources":["Autorité|https://www.autorite.qc.ca/"]},{"id":71,"category":"Retraite","claim":"«Régimes disparaissent»","context":"Détruit.","rebuttal":"Régimes privés globaux. Indépendance pas effet. Suisse régimes forts. Québec incentives fiscaux.","sources":["RRSP|https://www.canada.ca/fr/"]},{"id":72,"category":"Syndicats","claim":"«Perdent pouvoirs»","context":"Disparaissent.","rebuttal":"Syndicats Québec forts (FTQ, CSN). Indépendance = négociation directe. Belgique syndicats puissants. Québec pouvoir PLUS.","sources":["FTQ|https://www.ftq.qc.ca/"]},{"id":73,"category":"Éthique","claim":"«Corruption augmente»","context":"Moins éthique.","rebuttal":"Petit gouvernement = transparent. Accountability facile. Suisse, Belgique standards hauts. Scandales Ottawa risques gros fédéral.","sources":["Transparency|https://www.transparency.org/"]},{"id":74,"category":"Audit","claim":"«VG moins indépendant»","context":"Réduit.","rebuttal":"Québec VG indépendant constitutionne. Indépendance = VG PLUS autonome. Belgique, Suisse efficaces.","sources":["VG|https://www.vgq.qc.ca/"]},{"id":75,"category":"IP","claim":"«Brevets vulnérables»","context":"Compromise.","rebuttal":"Indépendance = IP complet. Suisse, Belgique HUBS brevets. Suisse ~20K brevets/an leader.","sources":["Brevets|https://www.ic.gc.ca/"]},{"id":76,"category":"Brevets","claim":"«Quittent»","context":"Ailleurs.","rebuttal":"Québec 500+ brevets/an. Indépendance = IP, R&D PLUS. Israël leader brevets.","sources":["IRCC|https://www.ic.gc.ca/"]},{"id":77,"category":"Auteur","claim":"«Moins protégé»","context":"Moins.","rebuttal":"Québec signataire conventions. Indépendance renforce respect droits. Belgique, Suisse protections excellentes.","sources":["SOCAN|https://www.socan.ca/"]},{"id":78,"category":"Foncier","claim":"«À risque»","context":"Compromise.","rebuttal":"Registre foncier établi (~7M propriétés). Titres protégés constitutionne. Indépendance renforce. Belgique, Suisse sûr.","sources":["Registre|https://www.quebec.ca/"]},{"id":79,"category":"Eau","claim":"«Contaminée»","context":"Pas sûre.","rebuttal":"Québec gère eau potable. Indépendance = standards PLUS. Suisse qualité exceptionnelle.","sources":["Eau QC|https://www.quebec.ca/"]},{"id":80,"category":"Déchets","claim":"«Gestion échoue»","context":"Chaos.","rebuttal":"Centres tri établis. Indépendance = zéro déchet autonome. Suisse, Allemagne exemplaires.","sources":["Éco QC|https://www.quebec.ca/"]},{"id":81,"category":"Air","claim":"«Pollué augmente»","context":"Baisse.","rebuttal":"Politique air établie. Indépendance = standards PLUS. EU meilleur Canada.","sources":["Environnement|https://www.quebec.ca/"]},{"id":82,"category":"Aquatique","claim":"«Rivières polluées»","context":"Détruit.","rebuttal":"Gère lacs/rivières. Indépendance = protection PLUS. Suisse lacs purs.","sources":["Eau QC|https://www.quebec.ca/"]},{"id":83,"category":"Forêts","claim":"«Surexploitées»","context":"Épuisées.","rebuttal":"27% Canada (~2B hectares). Gestion durable établie. Indépendance = protection PLUS. Suède, Finlande leader.","sources":["Forêts|https://www.quebec.ca/"]},{"id":84,"category":"Agriculture","claim":"«Pas durable»","context":"Détruit.","rebuttal":"Bio croissante (~200 fermes). Indépendance = subventions durabilité directs. Suisse bio leader.","sources":["Bio QC|https://www.quebec.ca/"]},{"id":85,"category":"Pêche","claim":"«Surpêche»","context":"Épuisée.","rebuttal":"Flotte pêche régulée. Indépendance = gestion stocks autonome. Islande durable leader.","sources":["Pêches|https://www.quebec.ca/"]},{"id":86,"category":"Solaire","claim":"«Pas viable»","context":"Climat.","rebuttal":"Allemagne latitude similaire = 50% solaire. Québec potentiel croissant. Panneaux s'améliorent. Québec leader renouvelables.","sources":["Solaire|https://www.canada.ca/fr/"]},{"id":87,"category":"Éolien","claim":"«Paysage»","context":"Impact.","rebuttal":"Danemark 80% électricité éolienne. Parcs établis. Bénéfices > impact. Indépendance = acceptation locale.","sources":["Éolien|https://www.canada.ca/fr/"]},{"id":88,"category":"Géothermie","claim":"«Impossible»","context":"Pas viable.","rebuttal":"Islande 100% chauffage géothermique. Québec potentiel croissant. Technologie viable. Indépendance = investissements.","sources":["Géothermie|https://www.rncan.gc.ca/"]},{"id":89,"category":"Hydrogène","claim":"«Pas économe»","context":"Coûts.","rebuttal":"Suisse, Allemagne investissent massif (€50B+). Québec hydro = base parfaite. Indépendance = leader hydrogène.","sources":["Hydrogène|https://www.rncan.gc.ca/"]},{"id":90,"category":"Électriques","claim":"«Pas accessibles»","context":"Coûts.","rebuttal":"Réseau bornes croissant (~15K). Électricité abondante bon marché. Tesla, Hyundai Québec. Indépendance = subventions directs.","sources":["Électrique|https://www.quebec.ca/"]},{"id":91,"category":"Transit Élec","claim":"«Impossible»","context":"Pas viable.","rebuttal":"Zurich, Copenhague 100% électriques. Québec hydro ressource parfaite. Indépendance = transition rapide.","sources":["Transport|https://www.transports.gouv.qc.ca/"]},{"id":92,"category":"Cyclisme","claim":"«Disparaîtraient»","context":"Mobilité douce.","rebuttal":"Bixi croissance. Indépendance = cyclabilité majeurs. Amsterdam 50%, Copenhagen 45% vélo. Québec énorme.","sources":["Bixi|https://www.bixi.com/"]},{"id":93,"category":"Télétravail","claim":"«Réglementé»","context":"Strictement.","rebuttal":"Télétravail établi post-COVID. Régulation autonome flexible. Belgique, Suisse normalisé. Indépendance = flexibilité.","sources":["Emploi|https://www.quebec.ca/"]},{"id":94,"category":"Numérique","claim":"«Stagnante»","context":"Pas croissance.","rebuttal":"Unicorns (Wattpad 75M, Shopify). Écosystème dynamique. Indépendance = startup ecosystem.","sources":["Startup|https://www.quebec.ca/"]},{"id":95,"category":"E-commerce","claim":"«Écrasé»","context":"Disparaît.","rebuttal":"Commerce électronique établi. Indépendance = régulation équitable PMEs. Suisse florissant.","sources":["Commerce|https://www.quebec.ca/"]},{"id":96,"category":"Wellness","claim":"«Pas viable»","context":"Détruit.","rebuttal":"Spas, wellness (~500 centres). Indépendance = promotion USA, Europe. Costa Rica leader. Québec potentiel.","sources":["Tourisme|https://www.quebec.ca/"]},{"id":97,"category":"Sports","claim":"«Quittent»","context":"Disparaissent.","rebuttal":"Tour de France Canada établi. F1 Montréal (~150K). Indépendance = événements PLUS. Suisse, Belgique mondiaux.","sources":["Sport|https://www.quebec.ca/"]},{"id":98,"category":"Parcs","claim":"«Fermeraient»","context":"Nature.","rebuttal":"Parcs gérés (~25). Indépendance = conservation PLUS. Suisse parcs exceptionnels. Québec patrimoine.","sources":["Parcs|https://www.quebec.ca/"]},{"id":99,"category":"Patrimoine","claim":"«Négligé»","context":"Sites abandonnés.","rebuttal":"UNESCO sites protégés (Vieux-Québec). Indépendance = patrimoine autonomes. Belgique, Suisse reconnaissance.","sources":["UNESCO|https://whc.unesco.org/"]},{"id":100,"category":"Régions","claim":"«Abandonnées»","context":"Infrastructure.","rebuttal":"Gère développement régional. Indépendance = politiques régionales autonomes. Suisse cantons florissants. Québec structures renforcées.","sources":["Développement|https://www.quebec.ca/"]},{"id":101,"category":"Défense","claim":"«Impossible»","context":"Capacité.","rebuttal":"Suisse, Belgique armées efficaces. Suisse 200K (8.7M). Québec 8.5M aurait ~200-250K. Défense = sécurité, ONU peacekeeping.","sources":["Suisse Défense|https://www.vbs.admin.ch/"]},{"id":102,"category":"Militaire","claim":"«Pas viables»","context":"Défense.","rebuttal":"Luxembourg 1000, Malte 2000 efficaces. Québec aurait forces respectables. Technologie = force multiplicatrice.","sources":["Défense|https://www.defence.gov.au/"]},{"id":103,"category":"Renseignement","claim":"«Espionnage sans contrôle»","context":"Sécurité.","rebuttal":"Services renseignement établis. Indépendance = agences autonomes. Belgique, Suisse excellentes. Protection équivalente.","sources":["SCRS|https://www.canada.ca/fr/"]},{"id":104,"category":"Frontières","claim":"«Non contrôlables»","context":"Sécurité.","rebuttal":"Petits États gèrent frontières efficacement. Suisse-UE ouverte régulée. Québec-Canada gérée bien. Post-indépendance manageable.","sources":["Frontières|https://www.admin.ch/"]},{"id":105,"category":"Passeports","claim":"«Pas émettre»","context":"Documents.","rebuttal":"Chaque État souverain émet passeports. Luxembourg, Malte, Estonie administrent. Québec infrastructure = transition facile.","sources":["Passeports|https://www.canada.ca/"]},{"id":106,"category":"Douanes","claim":"«Inefficaces»","context":"Commerce.","rebuttal":"Suisse douanes modèles. Luxembourg-UE intégrées. Québec douanes établies. Post-indépendance continuité assurée.","sources":["Douanes|https://www.ezv.admin.ch/"]},{"id":107,"category":"Statistiques","claim":"«Données inaccessibles»","context":"Transparence.","rebuttal":"Québec ISQ indépendant déjà. Données gouvernement accessibles. Indépendance renforcerait transparence. Belgique, Suisse excellente.","sources":["ISQ|https://www.stat.gouv.qc.ca/"]},{"id":108,"category":"Transparence","claim":"«Opaque»","context":"Absence.","rebuttal":"Petit gouvernement = plus transparent. Accountability facile. Suisse, Belgique très transparents. Lois accès déjà en place.","sources":["Transparence|https://www.quebec.ca/"]},{"id":109,"category":"Politiques Pub","claim":"«Chaos»","context":"Mal gérées.","rebuttal":"Politiques établies fonctionnent. Indépendance = autonomie adapter. Pas bureaucratie fédérale. Efficacité augmente.","sources":["Politiques|https://www.quebec.ca/"]},{"id":110,"category":"Primaire","claim":"«Mal gérée»","context":"Éducation.","rebuttal":"Système établi (~600K élèves). Indépendance = curricula autonome. PISA comparable monde. Autonomie favorise innovations.","sources":["Éducation|https://www.quebec.ca/"]},{"id":111,"category":"Secondaire","claim":"«Perte qualité»","context":"Enseignement.","rebuttal":"Ranked meilleurs (PISA 2019 = 512 vs OCDE 487). Indépendance = standards autonomes. Excellence maintenue.","sources":["PISA|https://www.oecd.org/"]},{"id":112,"category":"Formation Pro","claim":"«Éliminée»","context":"Métiers.","rebuttal":"Formation établie (200+ DEP). Indépendance = partenariat employer-écoles. Suisse apprentissage dual leader. Québec modèles excellence.","sources":["Formation|https://www.quebec.ca/"]},{"id":113,"category":"Apprentissage","claim":"«Vie impossible»","context":"Éducation continue.","rebuttal":"Formation continue établie. Indépendance = finances autonomes. Belgique, Suisse lifelong leader. Québec potentiel.","sources":["Apprentissage|https://www.quebec.ca/"]},{"id":114,"category":"Bibliothèques","claim":"«Fermées»","context":"Accès livres.","rebuttal":"Réseaux (~400 libraries). Indépendance = financement direct. Belgique, Suisse excellentes. Québec ressources égales.","sources":["Bibliothèques|https://www.quebec.ca/"]},{"id":115,"category":"Musées","claim":"«Fermés»","context":"Patrimoine.","rebuttal":"Reconnus mondialement. Indépendance = financement direct. Belgique, Suisse prospères. Québec culture renforcée.","sources":["Musées|https://www.quebec.ca/"]},{"id":116,"category":"Cinéma","claim":"«Disparaît»","context":"Production.","rebuttal":"Robuste (~30 films/an, $500M). SODEC financement établi. Indépendance = subventions PLUS. Belgique, Suisse prospères. Cinéma renforcé.","sources":["SODEC|https://www.sodec.gouv.qc.ca/"]},{"id":117,"category":"Musique","claim":"«Éliminée»","context":"Spectacles.","rebuttal":"Scène vibrante. Festivals établis. Indépendance = soutien directs musiciens. Belgique, Suisse musique prospère. Artistes internationaux.","sources":["Musique|https://www.quebec.ca/"]},{"id":118,"category":"Littérature","claim":"«Disparaît»","context":"Édition.","rebuttal":"Reconnue. Éditeurs établis. Indépendance = publication autonome, marchés directs. Littérature renforcée.","sources":["Édition|https://www.quebec.ca/"]},{"id":119,"category":"Journalisme","claim":"«Presse impossible»","context":"Libre.","rebuttal":"Presse libre établie. Indépendance renforce liberté. Belgique, Suisse presse libre. Journalisme autonome renforcé.","sources":["Journalisme|https://www.spj.org/"]},{"id":120,"category":"Radio TV","claim":"«Bloquée»","context":"Audiovisuel.","rebuttal":"Établie. Indépendance = autonomie CRTC. Belgique, Suisse broadcasting florissant. Broadcasting renforcé.","sources":["CRTC|https://crtc.gc.ca/"]},{"id":121,"category":"Podcasts","claim":"«Régulés strictement»","context":"Médias numériques.","rebuttal":"Écosystème libre croissant. Indépendance = régulation flexible. Belgique, Suisse podcasts dynamiques. Prospérerait.","sources":["Spotify|https://www.spotify.com/"]},{"id":122,"category":"Publicité","claim":"«Excessivement»","context":"Marketing.","rebuttal":"Indépendance = régulation équitable. Belgique, Suisse publicité libres. Standards similaires. Agences prospéreraient.","sources":["Publicité|https://www.asac.ca/"]},{"id":123,"category":"Brands","claim":"«Disparaissent»","context":"Marchés.","rebuttal":"Reconnaissables. Indépendance = protection IP. Belgique brands prospères. Brands renforcés.","sources":["Brands|https://www.quebec.ca/"]},{"id":124,"category":"Produits Locaux","claim":"«Non viables»","context":"Production.","rebuttal":"Marché croissant. Indépendance = tarifs protectionnistes. Potentiel énorme.","sources":["Produits|https://www.quebec.ca/"]},{"id":125,"category":"Certifications","claim":"«Non reconnues»","context":"Labels.","rebuttal":"Reconnues internationalement. Indépendance = labels (AOC). Belgique, Suisse prospères. Valeur augmentée.","sources":["Certifications|https://www.quebec.ca/"]},{"id":126,"category":"Normes Qual","claim":"«Inférieures»","context":"Qualité.","rebuttal":"Parmi meilleures. Indépendance = standards PLUS. Belgique, Suisse excellence. Qualité renforcée.","sources":["Normes|https://www.scc.ca/"]},{"id":127,"category":"Traçabilité","claim":"«Impossible»","context":"Origine.","rebuttal":"Systèmes établis. Indépendance = transparence supply chain autonome. Suisse leader. Traçabilité prospérerait.","sources":["Traçabilité|https://www.quebec.ca/"]},{"id":128,"category":"Commerce Équitable","claim":"«Éliminé»","context":"Juste.","rebuttal":"Croissant (~€200M). Indépendance = priorités autonomes. Belgique leader. Commerce ethics renforcées.","sources":["Commerce Équitable|https://www.quebec.ca/"]},{"id":129,"category":"Économie Solidaire","claim":"«Impossible»","context":"Solidarité.","rebuttal":"Établie. Indépendance = finance directe. Belgique modèle. Sector amplifié.","sources":["Solidaire|https://www.quebec.ca/"]},{"id":130,"category":"Coopératives","claim":"«Disparaissent»","context":"Structures.","rebuttal":"~2000 coops. Indépendance = gouvernance autonome. Belgique coops prospères. Renforcées.","sources":["Coops|https://www.coopscanada.coop/"]},{"id":131,"category":"PME","claim":"«Disparaissent»","context":"Entreprises.","rebuttal":"Écosystème ~500K. Indépendance = support direct, taxes réductions. Belgique, Suisse prospères. Exponential growth.","sources":["PME|https://www.quebec.ca/"]},{"id":132,"category":"Startups","claim":"«Quittent»","context":"Entrepreneuriat.","rebuttal":"Écosystème dynamique. Indépendance = financement direct. Belgique, Suisse florissantes. Hub regional.","sources":["Startup|https://www.quebec.ca/"]},{"id":133,"category":"Incubateurs","claim":"«Fermés»","context":"Support.","rebuttal":"~50 incubators. Indépendance = financement PLUS. Belgique, Suisse leaders. Ecosystem prosperous.","sources":["Incubateurs|https://www.quebec.ca/"]},{"id":134,"category":"Mentorat","claim":"«Disparu»","context":"Accompagnement.","rebuttal":"Programmes établis. Indépendance = programs PLUS. Belgique mentorat leader. Entrepreneurs autonome supported.","sources":["Mentorat|https://www.quebec.ca/"]},{"id":135,"category":"Financement","claim":"«Impossible»","context":"Capital.","rebuttal":"Canaux multiples. Indépendance = financement PLUS direct. Suisse PME financing excellent. Access amélioré.","sources":["Financement|https://www.quebec.ca/"]},{"id":136,"category":"Capital-Risque","claim":"«Quitte»","context":"VC.","rebuttal":"Fonds (~€5B). Indépendance = tax incentives PLUS. Belgique, Suisse VC strong. Hub attractive.","sources":["VC|https://www.quebec.ca/"]},{"id":137,"category":"Crowdfunding","claim":"«Bloqué»","context":"Participatif.","rebuttal":"Plateformes établies. Indépendance = régulation favorable. Belgique, Suisse active. Prospère.","sources":["Crowdfunding|https://www.quebec.ca/"]},{"id":138,"category":"Microfinance","claim":"«Impossible»","context":"Petit financement.","rebuttal":"Accessible. Indépendance = accessibility PLUS. Belgique microcredit strong. Renforcée.","sources":["Microfinance|https://www.quebec.ca/"]},{"id":139,"category":"Épargne","claim":"«Non sécurisée»","context":"Placements.","rebuttal":"Sécurisés. Indépendance = protection PLUS. Belgique, Suisse public protected. Secure.","sources":["Épargne|https://www.cdic.ca/"]},{"id":140,"category":"Fonds Placement","claim":"«Fermés»","context":"Placements.","rebuttal":"~€500B. Indépendance = diversification PLUS. Belgique, Suisse prospères. Abundant options.","sources":["Fonds|https://www.quebec.ca/"]},{"id":141,"category":"Titres Valeurs","claim":"«Non garantis»","context":"Valeurs.","rebuttal":"Régulés. Indépendance = regulation autonome. Belgique, Suisse protected. Safe.","sources":["Titres|https://www.quebec.ca/"]},{"id":142,"category":"Bourse","claim":"«Fermée»","context":"Marché.","rebuttal":"TMX prospère. Indépendance = continuité assurée. Belgique, Suisse active. Thriving.","sources":["TMX|https://www.tmx.com/"]},{"id":143,"category":"Trading","claim":"«Bloqué»","context":"Spéculation.","rebuttal":"Marchés actifs. Indépendance = accessible. Belgique, Suisse flourish. Dynamic.","sources":["Trading|https://www.quebec.ca/"]},{"id":144,"category":"Cryptocurrency","claim":"«Interdite»","context":"Numériques.","rebuttal":"Écosystème établi. Indépendance = regulation flexible. Canada crypto friendly. Ecosystem prosperous.","sources":["Crypto|https://www.quebec.ca/"]},{"id":145,"category":"Monnaie Locale","claim":"«Pas viable»","context":"Locales.","rebuttal":"Expériences réussies globales. Indépendance = devise autonome. Monnaie propre = pouvoir complet.","sources":["Monnaie|https://www.quebec.ca/"]},{"id":146,"category":"Banques Alt","claim":"«Fermées»","context":"Alternative.","rebuttal":"Finance croissantes. Indépendance = fintech ecosystem amplified. Belgique, Suisse alt-banking thriving. Acceleration.","sources":["Alt-Banque|https://www.quebec.ca/"]},{"id":147,"category":"Fintech","claim":"«Éliminé»","context":"Technologie.","rebuttal":"Écosystème robust. Indépendance = fintech regulation attractif. Belgique, Suisse fintech hubs. Fintech leader.","sources":["Fintech|https://www.quebec.ca/"]},{"id":148,"category":"Paiements Élec","claim":"«Bloqués»","context":"E-paiements.","rebuttal":"Modernes. Indépendance = payments autonome. Belgique, Suisse advanced. Excellent.","sources":["Paiements|https://www.quebec.ca/"]},{"id":149,"category":"Blockchain Smart","claim":"«Smart contracts interdits»","context":"Intelligents.","rebuttal":"Technologie accessible. Indépendance = smart contract regulation autonome. Belgique, Suisse friendly. Ecosystem emerging.","sources":["Blockchain|https://www.quebec.ca/"]},{"id":150,"category":"Web3","claim":"«Web3 pas viable»","context":"Économie décentralisée.","rebuttal":"Écosystème Web3 croissant. Indépendance = Web3 regulation favorable. Suisse Web3 adopter (Zug). Québec Web3 hub probable post-indépendance.","sources":["Web3|https://www.quebec.ca/"]}];

let allDebunks=[...debunks];let filteredDebunks=[...debunks];function initApp(){renderStats();renderDebunks();populateCategoryFilter()}function renderStats(){const s=document.getElementById('stats');const c=new Set(allDebunks.map(d=>d.category)).size;const src=allDebunks.reduce((sum,d)=>sum+d.sources.length,0);s.innerHTML=`<div class="stat-card"><div class="stat-number">${allDebunks.length}</div><div class="stat-label">Débunks</div></div><div class="stat-card"><div class="stat-number">${c}</div><div class="stat-label">Catégories</div></div><div class="stat-card"><div class="stat-number">${src}</div><div class="stat-label">Sources</div></div>`}function populateCategoryFilter(){const cat=[...new Set(allDebunks.map(d=>d.category))].sort();const sel=document.getElementById('categoryFilter');sel.innerHTML='<option value="">Toutes les catégories</option>'+cat.map(c=>`<option value="${c}">${c}</option>`).join('')}function filterDebunks(){const s=document.getElementById('search').value.toLowerCase();const cat=document.getElementById('categoryFilter').value;filteredDebunks=allDebunks.filter(d=>{const mc=!cat||d.category===cat;const ms=!s||d.claim.toLowerCase().includes(s);return mc&&ms});renderDebunks()}function renderDebunks(){const l=document.getElementById('debunk-list');const e=document.getElementById('empty-state');if(filteredDebunks.length===0){l.style.display='none';e.style.display='block';e.innerHTML='<h2>Aucun résultat</h2>';return}l.style.display='grid';e.style.display='none';l.innerHTML=filteredDebunks.map(d=>`<div class="card" onclick="showDetail(${d.id})"><div class="badge">${d.category}</div><h3 class="card-title">${d.claim}</h3><div class="card-meta">📌 ${d.sources.length} source(s)</div></div>`).join('')}function showDetail(id){const d=allDebunks.find(d=>d.id===id);if(!d)return;document.getElementById('debunk-list').style.display='none';const det=document.getElementById('detail-view');det.innerHTML=`<button class="btn-secondary" onclick="backToList()">← Retour</button><div class="detail-header"><span class="badge">${d.category}</span><h1>${d.claim}</h1></div><div class="detail-section"><h3>📍 Contexte</h3><p>${d.context}</p></div><div class="detail-section"><h3>✅ Réfutation documentée</h3><p>${d.rebuttal}</p></div><div class="detail-section"><h3>📚 Sources</h3><ul class="sources-list">${d.sources.map(s=>{const p=s.split('|');return`<li><strong>${p[0]}</strong>${p[1]?` <a href="${p[1]}" target="_blank">🔗</a>`:''}</li>`}).join('')}</ul></div><div style="display:flex;gap:1rem"><button class="btn-secondary" onclick="openEditModal(${id})">Éditer</button><button class="btn-secondary" onclick="deleteDebunk(${id})" style="color:#d32f2f">Supprimer</button></div>`;det.classList.add('show')}function backToList(){document.getElementById('detail-view').classList.remove('show');document.getElementById('debunk-list').style.display='grid'}function openAddModal(){document.getElementById('modal-title').textContent='Ajouter';['form-category','form-claim','form-context','form-rebuttal','form-sources'].forEach(id=>document.getElementById(id).value='');document.getElementById('modal').classList.add('open')}function openEditModal(id){const d=allDebunks.find(d=>d.id===id);document.getElementById('modal-title').textContent='Éditer';document.getElementById('form-category').value=d.category;document.getElementById('form-claim').value=d.claim;document.getElementById('form-context').value=d.context;document.getElementById('form-rebuttal').value=d.rebuttal;document.getElementById('form-sources').value=d.sources.join('\n');document.getElementById('modal').dataset.editId=id;document.getElementById('modal').classList.add('open')}function closeModal(){document.getElementById('modal').classList.remove('open')}function saveDebunk(){const cat=document.getElementById('form-category').value.trim();const cl=document.getElementById('form-claim').value.trim();const ctx=document.getElementById('form-context').value.trim();const reb=document.getElementById('form-rebuttal').value.trim();const st=document.getElementById('form-sources').value.trim();if(!cat||!cl||!reb){alert('Remplissez tous les champs');return}const src=st.split('\n').filter(s=>s.trim());const eid=document.getElementById('modal').dataset.editId;if(eid){const idx=allDebunks.findIndex(d=>d.id==eid);allDebunks[idx]={...allDebunks[idx],category:cat,claim:cl,context:ctx,rebuttal:reb,sources:src}}else{allDebunks.push({id:Math.max(...allDebunks.map(d=>d.id),0)+1,category:cat,claim:cl,context:ctx,rebuttal:reb,sources:src})}closeModal();renderStats();populateCategoryFilter();filterDebunks()}function deleteDebunk(id){if(!confirm('Supprimer?'))return;allDebunks=allDebunks.filter(d=>d.id!==id);renderStats();populateCategoryFilter();filterDebunks();backToList()}document.getElementById('search').addEventListener('input',filterDebunks);document.getElementById('categoryFilter').addEventListener('change',filterDebunks);initApp();
</script>
