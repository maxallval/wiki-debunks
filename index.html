<style>

.container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

  position: sticky;

}

.sidebar-title { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #666; margin-bottom: 1rem; letter-spacing: 0.5px; }

  width: 100%;

  background: white; 
  border: 1px solid #e0e0e0;

}
.sidebar-btn:hover { background: #f5f7fa; border-color: #0052cc; }

.main-content { }
.stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem; margin-bottom: 2rem; }
.stat-card { background: white; padding: 1.5rem; border-radius: 8px; border: 1px solid #e0e0e0; text-align: center; }

.stat-label { font-size: 12px; color: #666; margin-top: 0.5rem; text-transform: uppercase; }

.debunk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 1.5rem; }
.card {
  background: white;
  border: 1px solid #e0e0e0;
  border-radius: 8px;
  padding: 1.5rem;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 3px;
  background: linear-gradient(90deg, #0052cc, #5eb3ff);
  transform: scaleX(0);
  transition: transform 0.3s;
  transform-origin: left;
}
.card:hover {
  border-color: #0052cc;
  box-shadow: 0 8px 24px rgba(0,82,204,0.15);
  transform: translateY(-4px);
}
.card:hover::before { transform: scaleX(1); }

.badge {
  display: inline-block;
  background: #f0f4ff;
  color: #0052cc;
  padding: 0.5rem 1rem;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.card-title { font-size: 16px; font-weight: 600; margin: 0.75rem 0; line-height: 1.4; }

  justify-content: center;
  padding: 1rem;
}
.modal.open { display: flex; }
.modal-content {
  background: white;
  border-radius: 12px;
  padding: 2rem;
  max-width: 700px;
  width: 100%;

.form-group {

.sources-list {

}
.sources-list li {

<body>

<div class="header">
  <div class="header-content">
    <h1>🇶🇨 Wiki Debunks — Souveraineté</h1>
    <p>Base de données collaborative de réfutations documentées sur les enjeux de souveraineté québécoise</p>
    <div class="controls">
      <input type="text" id="search" placeholder="Chercher un débunk...">
      <select id="categoryFilter">
        <option value="">Toutes les catégories</option>
      </select>
      <button class="btn-primary" onclick="openAddModal()">+ Ajouter un débunk</button>
    </div>
  </div>
</div>

<div class="container">
  <div id="stats" class="stats"></div>

  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>

    <main class="main-content">
      <div id="debunk-list" class="debunk-grid"></div>
      <div id="detail-view" class="detail-view"></div>
      <div id="empty-state" class="empty-state"></div>
    </main>
  </div>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modal-title">Ajouter un débunk</h2>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label>Catégorie</label>
      <input type="text" id="form-category" placeholder="ex: Économie, Transferts...">
    </div>
    <div class="form-group">
      <label>Affirmation (ce qui est faux)</label>
      <textarea id="form-claim" placeholder="Entrez l'affirmation à débunker..."></textarea>
    </div>
    <div class="form-group">
      <label>Contexte</label>
      <textarea id="form-context" placeholder="Qui l'a dite? Quand? Où?"></textarea>
    </div>
    <div class="form-group">
      <label>Réfutation</label>
      <textarea id="form-rebuttal" placeholder="L'explication et les faits qui contredisent..."></textarea>
    </div>
    <div class="form-group">
      <label>Sources (Titre | URL, une par ligne)</label>
      <textarea id="form-sources" placeholder="Statistiques Canada | https://...\nRapport IRPP | https://..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-secondary" onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveDebunk()">Publier</button>
    </div>
  </div>
</div>

<div class="footer">
  <p>Wiki Debunks Souveraineté © 2026 | Contenu collaboratif et documenté | <a href="#">À propos</a></p>
</div>

<script>
const debunks = [
  {
    id: 1,
    category: "Fiscalité & Transferts",
    claim: "« Le Québec reçoit plus en transferts fédéraux que ce qu'il contribue »",
    context: "Affirmation commune pour justifier l'importance du fédéralisme.",
    rebuttal: "Faux. Les transferts en santé et éducation sont basés sur les populations; le Québec contribue davantage en impôts qu'il ne reçoit. Selon l'Institut de recherche en politiques publiques (IRPP), le Québec paie environ 18-20 % des impôts fédéraux pour ~23 % de la population. Calcul simple: un Québécois paie plus en impôts fédéraux qu'il ne reçoit en transferts par habitant.",
    sources: ["IRPP - Fiscal Federalism | https://irpp.org/", "Statistiques Canada | https://www.statcan.gc.ca/", "CIRANO - Analyses fiscales Québec | https://www.cirano.qc.ca/"]
  },
  {
    id: 2,
    category: "Viabilité Économique",
    claim: "« Un Québec indépendant serait en crise économique immédiate »",
    context: "Scénario catastrophe présenté lors des campagnes référendaires (1995, campagne NON).",
    rebuttal: "Le Québec a un PIB de ~$400 milliards (plus grand que la Suisse, la Suède). D'autres petites nations indépendantes (Nouvelle-Zélande ~5.1M, Irlande ~5.2M, Danemark ~5.8M) ont des économies stables et prospères. Un Québec souverain aurait accès aux marchés de capitaux, pourrait émettre sa propre devise/obligations, et aurait des institutions établies. Les modèles de transition économique (Slovénie 1991) montrent que des ajustements court-terme existent mais ne causent pas d'effondrement.",
    sources: ["Statistiques Canada - PIB | https://www.statcan.gc.ca/", "OCDE - Economic Profiles | https://www.oecd.org/", "FMI Global Database | https://www.imf.org/"]
  },
  {
    id: 3,
    category: "Monétisation & Finances",
    claim: "« Un Québec indépendant ne pourrait pas monétiser sa dette »",
    context: "Argument utilisé pour dire que la souveraineté causerait une crise financière.",
    rebuttal: "Le Québec aurait accès aux marchés de capitaux internationaux, à un bilan solide, et à des institutions financières établies. Des petites économies comme la Suède, Norvège, Nouvelle-Zélande, Belgique empruntent régulièrement sans problème. Les agences de notation (Moody's, S&P) évaluent la solvabilité basée sur les fondamentaux économiques, pas sur la taille. Le Québec aurait des fondamentaux solides.",
    sources: ["Banque Mondiale - Indicateurs | https://data.worldbank.org/", "Standard & Poor's | https://www.spglobal.com/", "Moody's Investors Service | https://www.moodys.com/"]
  },
  {
    id: 4,
    category: "Dette Fédérale",
    claim: "« Le Québec devrait assumer une part énorme de la dette canadienne »",
    context: "Argument que le partage de la dette ferait du Québec un État insolvable.",
    rebuttal: "Le partage de la dette est un enjeu de négociation, pas un fait établi. Le Québec assumerait une part proportionnelle (~20 %), mais récupérerait aussi une part proportionnelle des actifs fédéraux (immobilier, équipements, réserves). Les précédents historiques (Tchécoslovaquie 1993) montrent que les États négocient des arrangements mutuels. La dette québécoise (~55-60 % du PIB) est comparable à celle de nations occidentales.",
    sources: ["Observatoire québécois de la souveraineté | https://www.observatoire-souverainete.com/", "FMI - Global Debt Statistics | https://www.imf.org/"]
  },
  {
    id: 5,
    category: "Pensions & Retraites",
    claim: "« Les retraités québécois perdraient leur pension de retraite »",
    context: "Crainte que les droits acquis (CPP/RRQ) disparaissent lors d'une indépendance.",
    rebuttal: "Le Régime de rentes du Québec (RRQ) est DÉJÀ géré par le Québec depuis 1966. Les cotisations des Québécois restent à Québec; la Caisse de dépôt et placement du Québec gère des dizaines de milliards. En indépendance, le Québec continuerait le RRQ sans interruption. Les droits acquis sont protégés par droit québécois et international. Le CPP serait négociable mais sécurisé.",
    sources: ["Régie des rentes du Québec | https://www.rrq.gouv.qc.ca/", "CDPQ | https://www.cdpq.com/", "Services Canada - CPP | https://www.canada.ca/fr/"]
  },
  {
    id: 6,
    category: "Droits & Libertés",
    claim: "« La Charte des droits disparaîtrait, les Québécois perdraient leurs droits »",

    sources: ["Charte québécoise | https://www.quebec.ca/", "Conseil ONU droits | https://www.ohchr.org/"]
  },
  {
    id: 7,
    category: "Emploi & Chômage",
    claim: "« L'indépendance causerait une augmentation massive du chômage »",
    context: "Prédiction d'effondrement de l'emploi post-référendaire.",
    rebuttal: "Les données post-référendum 1995 montrent que le Québec a continué sa croissance d'emploi (2000-2020). Les micro-États (Luxembourg 0.67M, Islande 0.38M) connaissent des taux de chômage parmi les plus bas au monde. Les secteurs clés du Québec (aérospatiale, biotech, énergie) sont mondialement compétitifs et bénéficieraient d'une politique économique autonome.",
    sources: ["Statistiques Canada - Emploi | https://www.statcan.gc.ca/", "OCDE - Labour Stats | https://www.oecd.org/"]
  },
  {
    id: 8,
    category: "Commerce International",
    claim: "« Un Québec indépendant ne pourrait pas commercer avec le Canada »",
    context: "Argument que les tarifs détruiraient le commerce interprovincial.",
    rebuttal: "Les échanges commerciaux entre États indépendants sont la NORME (Canada-USA, Suisse-UE). L'intérêt économique pousse au libre-échange. Un accord commercial Québec-Canada post-indépendance est pratiquement inévitable (modèle: union douanière ou traité bilatéral). Estimations: le commerce Québec-Canada pourrait augmenter car le Québec pourrait négocier directement avec d'autres partenaires.",
    sources: ["OMC - Accords commerciaux | https://www.wto.org/", "CIRANO | https://www.cirano.qc.ca/"]
  },
  {
    id: 9,
    category: "Ressources Naturelles",
    claim: "« Le Québec n'a pas assez de ressources naturelles pour survivre »",
    context: "Minimisation des actifs québécois.",
    rebuttal: "Le Québec a des ressources MAJEURES: hydroélectricité (1er producteur nord-américain), forêts boréales (~27 % couvert forestier Canada), minéraux (lithium, cobalt, cuivre), eaux douces (15 % réserves mondiales). Hydro-Québec seul génère des surplus énergétiques exportables vers USA. Ces actifs donnent au Québec un pouvoir économique CONSIDÉRABLE.",
    sources: ["Hydro-Québec | https://www.hydroquebec.com/", "Ressources naturelles Canada | https://www.rncan.gc.ca/"]
  },
  {
    id: 10,
    category: "Immigration & Démographie",
    claim: "« Le Québec perdrait le contrôle de l'immigration »",
    context: "Crainte d'une immigration incontrôlée imposée par le fédéral.",
    rebuttal: "Le Québec contrôle DÉJÀ partiellement son immigration via l'Accord Gagnon-Tremblay (1991). Un Québec souverain aurait contrôle complet. Historiquement, la population québécoise est stable/croissante. Aucune nation n'a perdu sa viabilité démographique par indépendance. Les petites nations (Suisse, Belgique) maintiennent leurs démographies sans problème.",
    sources: ["Immigration Canada | https://www.canada.ca/fr/", "Institut statistique Québec | https://www.stat.gouv.qc.ca/"]
  },
  {
    id: 11,
    category: "Infrastructure",
    claim: "« Le Québec ne pourrait pas maintenir ses infrastructures seul »",
    context: "Dépendance perçue aux programmes fédéraux.",
    rebuttal: "Le Québec contribue davantage aux programmes fédéraux qu'il ne reçoit. Les provinces australiennes (plus petites que Québec) gèrent leurs infrastructures. Un Québec souverain aurait les revenus nécessaires (routes, ponts, transit, électricité). L'efficacité pourrait même s'améliorer grâce à une gouvernance centralisée.",
    sources: ["Infrastructure Canada | https://www.canada.ca/fr/", "Ministère Transports Québec | https://www.transports.gouv.qc.ca/"]

  {
    id: 12,
    category: "Langue & Culture",
    claim: "« Un Québec indépendant verrait sa langue et culture disparaître »",

    rebuttal: "C'est l'inverse. Le Québec indépendant aurait un contrôle total sur ses politiques linguistiques (actuellement limité par les droits fédéraux). Les États-nations protègent mieux leurs minorités linguistiques. La Belgique, Suisse, Catalogne (aspirée) protègent les langues minoritaires plus efficacement que dans des cadres fédéraux.",

    rebuttal: "Le Québec a DÉJÀ les institutions pour la politique environnementale (MELCCFP). L'énergie hydroélectrique du Québec est parmi les plus bas-carbone au monde. Un Québec souverain négocierait directement les accords climatiques (comme la Suisse, la Belgique le font). Le Québec pourrait fixer des standards environnementaux plus ambitieux.",
    sources: ["Ministère Environnement Québec | https://www.quebec.ca/", "Accord de Paris | https://unfccc.int/"]
  },
  {
    id: 14,

    rebuttal: "Les données historiques montrent que les petites économies indépendantes sont souvent entrepreneuriales. Luxembourg, Singapour, Israël ont des écosystèmes d'innovation forts. Les avantages d'une politique économique autonome (impôts compétitifs, régulation adaptée) attireraient les investissements. Le Québec a déjà des secteurs forts (IA, jeux vidéo, aérospatiale).",
    sources: ["Statistiques Canada - Entreprises | https://www.statcan.gc.ca/", "Conseil économique Québec | https://www.conseil.gouv.qc.ca/"]
  },
  {
    id: 15,
    category: "Sécurité Sociale",
    claim: "« La sécurité sociale québécoise serait compromise »",

    rebuttal: "La sécurité sociale au Québec est administrée par le Québec (santé, éducation, services sociaux). L'indépendance n'affecterait pas ces programmes; elle donnerait au Québec plus de flexibilité pour les adapter. Les pays nordiques (Suède, Danemark) ont des systèmes sociaux parmi les meilleurs au monde. L'indépendance politique permet une meilleure gestion social.",
    sources: ["Ministère Santé Québec | https://www.quebec.ca/", "Santé Canada | https://www.canada.ca/fr/", "OCDE - Social Spending | https://www.oecd.org/"]

let allDebunks = [...debunks];
let filteredDebunks = [...debunks];

function initApp() {
  renderStats();
  renderSidebar();
  renderDebunks();
  populateCategoryFilter();
}

function renderStats() {
  const statsDiv = document.getElementById('stats');
  const categories = new Set(allDebunks.map(d => d.category)).size;
  const sources = allDebunks.reduce((sum, d) => sum + d.sources.length, 0);
  
  statsDiv.innerHTML = `
    <div class="stat-card">
      <div class="stat-number">${allDebunks.length}</div>
      <div class="stat-label">Débunks</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${categories}</div>
      <div class="stat-label">Catégories</div>
    </div>
    <div class="stat-card">
      <div class="stat-number">${sources}</div>
      <div class="stat-label">Sources</div>
    </div>
  `;
}

function renderSidebar() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const sidebar = document.getElementById('sidebar');
  
  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-title">Catégories</div>
      <button class="sidebar-btn active" onclick="filterBySidebar(null)">Tous</button>
      ${categories.map(cat => `<button class="sidebar-btn" onclick="filterBySidebar('${cat}')">${cat}</button>`).join('')}
    </div>
  `;
}

function populateCategoryFilter() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const select = document.getElementById('categoryFilter');
  select.innerHTML = '<option value="">Toutes les catégories</option>' + 
    categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
  select.addEventListener('change', filterDebunks);
}

function filterBySidebar(cat) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('categoryFilter').value = cat || '';
  filterDebunks();
}

function filterDebunks() {
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  
  filteredDebunks = allDebunks.filter(d => {
    const matchCat = !category || d.category === category;
    const matchSearch = !search || d.claim.toLowerCase().includes(search) || d.category.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  
  renderDebunks();
}

function renderDebunks() {
  const list = document.getElementById('debunk-list');
  const empty = document.getElementById('empty-state');
  
  if (filteredDebunks.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = '<h2>Aucun résultat</h2><p>Essayez une autre recherche</p>';
    return;
  }
  
  list.style.display = 'grid';
  empty.style.display = 'none';
  
  list.innerHTML = filteredDebunks.map(d => `
    <div class="card" onclick="showDetail(${d.id})">
      <div class="badge">${d.category}</div>
      <h3 class="card-title">${d.claim}</h3>
      <div class="card-meta">📌 ${d.sources.length} source${d.sources.length > 1 ? 's' : ''}</div>
    </div>
  `).join('');
}

function showDetail(id) {
  const debunk = allDebunks.find(d => d.id === id);
  if (!debunk) return;
  
  document.getElementById('debunk-list').style.display = 'none';
  document.getElementById('empty-state').style.display = 'none';
  
  const detail = document.getElementById('detail-view');
  detail.innerHTML = `
    <button class="btn-secondary" onclick="backToList()">← Retour aux résultats</button>
    
    <div class="detail-header">
      <span class="badge">${debunk.category}</span>
      <h1>${debunk.claim}</h1>
    </div>
    
    <div class="detail-section">
      <h3>📍 Contexte</h3>
      <p>${debunk.context}</p>
    </div>
    
    <div class="detail-section">
      <h3>✅ Réfutation</h3>
      <p>${debunk.rebuttal}</p>
    </div>
    
    <div class="detail-section">
      <h3>📚 Sources</h3>
      <ul class="sources-list">
        ${debunk.sources.map(s => {
          const parts = s.split(' | ');
          const title = parts[0] || 'Source';
          const url = parts[1] || '';
          return `<li>
            <strong>${title}</strong>
            ${url ? `<a href="${url}" target="_blank" rel="noopener">🔗 lien</a>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </div>
    
    <div style="display: flex; gap: 1rem;">
      <button class="btn-secondary" onclick="openEditModal(${id})">Éditer</button>
      <button class="btn-secondary" onclick="deleteDebunk(${id})" style="color: #d32f2f;">Supprimer</button>
    </div>
  `;
  detail.classList.add('show');
}

function backToList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('debunk-list').style.display = 'grid';
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Ajouter un débunk';
  document.getElementById('form-category').value = '';
  document.getElementById('form-claim').value = '';
  document.getElementById('form-context').value = '';
  document.getElementById('form-rebuttal').value = '';
  document.getElementById('form-sources').value = '';
  document.getElementById('modal').dataset.editId = '';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const debunk = allDebunks.find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Éditer ce débunk';
  document.getElementById('form-category').value = debunk.category;
  document.getElementById('form-claim').value = debunk.claim;
  document.getElementById('form-context').value = debunk.context;
  document.getElementById('form-rebuttal').value = debunk.rebuttal;
  document.getElementById('form-sources').value = debunk.sources.join('\n');
  document.getElementById('modal').dataset.editId = id;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveDebunk() {
  const category = document.getElementById('form-category').value.trim();
  const claim = document.getElementById('form-claim').value.trim();
  const context = document.getElementById('form-context').value.trim();
  const rebuttal = document.getElementById('form-rebuttal').value.trim();
  const sourceText = document.getElementById('form-sources').value.trim();
  
  if (!category || !claim || !rebuttal) {
    alert('Remplissez: catégorie, affirmation et réfutation');
    return;
  }
  
  const sources = sourceText.split('\n').filter(s => s.trim());
  const editId = document.getElementById('modal').dataset.editId;
  
  if (editId) {
    const idx = allDebunks.findIndex(d => d.id == editId);
    allDebunks[idx] = { ...allDebunks[idx], category, claim, context, rebuttal, sources };
  } else {
    allDebunks.push({
      id: Math.max(...allDebunks.map(d => d.id), 0) + 1,
      category, claim, context, rebuttal, sources
    });
  }
  
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  closeModal();
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

function deleteDebunk(id) {
  if (!confirm('Supprimer ce débunk?')) return;
  allDebunks = allDebunks.filter(d => d.id !== id);
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

document.getElementById('search').addEventListener('input', filterDebunks);

initApp();
</script>

</body>
</html>
