<script>
const debunks = [{"id": 1, "category": "Fiscalité & Transferts", "claim": "« Le Québec reçoit plus en transferts fédéraux que ce qu'il contribue »", "context": "Affirmation commune pour justifier le fédéralisme.", "rebuttal": "C'est faux. Selon l'Institut de recherche en politiques publiques (IRPP), le Québec contribue 18-20% des impôts fédéraux alors qu'il représente 23% de la population canadienne. Québec paie donc davantage qu'il ne reçoit. Les transferts fédéraux en santé et éducation utilisent des formules per capita avantageant les provinces riches. Une analyse complète montre que Québec finance le reste du Canada, non l'inverse. Le deficit fiscal québécois est bien documenté.", "sources": ["IRPP | https://irpp.org/", "Statcan | https://www.statcan.gc.ca/"]}, {"id": 2, "category": "Viabilité Économique", "claim": "« Un Québec indépendant serait en crise économique immédiate »", "context": "Scénario catastrophe présenté lors des campagnes référendaires.", "rebuttal": "Le Québec possède un PIB de ~$400 milliards, supérieur à celui de la Suisse, Suède, Norvège ou Belgique. Ces petites nations prospèrent comme États indépendants avec excellentes économies. Québec a secteurs forts: hydro-électricité, aérospatiale, technologies, ressources naturelles. La transition serait probablement courte. Aucune preuve économique solide ne soutient une crise immédiate après indépendance.", "sources": ["Statcan | https://www.statcan.gc.ca/", "OCDE | https://www.oecd.org/", "FMI | https://www.imf.org/"]}, {"id": 3, "category": "Monétisation & Finances", "claim": "« Un Québec indépendant ne pourrait pas monétiser sa dette »", "context": "Argument utilisé pour dire que la souveraineté causerait une crise financière.", "rebuttal": "Québec aurait accès complet aux marchés de capitaux internationaux. Un État indépendant avec stabilité politique et finances saines emprunte facilement. La Suède, Norvège, Nouvelle-Zélande, Belgique et Danemark, tous souverains, empruntent régulièrement à taux favorables sans problème. Les agences de notation (S&P, Moody's) évalueraient probablement Québec comme crédit de qualité. La capacité d'emprunt n'est pas un problème.", "sources": ["Banque Mondiale | https://data.worldbank.org/", "Standard & Poor's | https://www.spglobal.com/"]}, {"id": 4, "category": "Dette Fédérale", "claim": "« Le Québec devrait assumer une part énorme de la dette canadienne »", "context": "Argument que le partage de la dette ferait du Québec un État insolvable.", "rebuttal": "Le partage de la dette fédérale serait un enjeu de négociation entre États souverains. Québec assumerait une part proportionnelle (~20%) mais récupérerait également une part proportionnelle des actifs fédéraux, holdings, propriétés, et revenus. Les précédents historiques (Tchécoslovaquie, Serbie-Monténégro, Inde-Pakistan) montrent que ces arrangements sont négociables et souvent équitables pour les parties.", "sources": ["Observatoire québécois | https://www.observatoire-souverainete.com/", "FMI | https://www.imf.org/"]}, {"id": 5, "category": "Pensions & Retraites", "claim": "« Les retraités québécois perdraient leur pension de retraite »", "context": "Crainte que les droits acquis (CPP/RRQ) disparaissent.", "rebuttal": "Le Régime de rentes du Québec (RRQ) est DÉJÀ géré complètement par Québec depuis 1966, pas par le fédéral. Les cotisations restent au Québec, les retraites sont versées par Québec. L'indépendance n'affecterait pas le RRQ. Concernant le CPP (Régime de pensions du Canada), le Québec pourrait négocier une transition, mais les droits acquis seraient protégés. Zéro risque pour les retraites existantes.", "sources": ["RRQ | https://www.rrq.gouv.qc.ca/", "CDPQ | https://www.cdpq.com/"]}, {"id": 6, "category": "Droits & Libertés", "claim": "« La Charte des droits et libertés disparaîtrait »", "context": "Crainte que l'indépendance signifie fin des protections légales.", "rebuttal": "La Charte québécoise des droits et libertés (1975) est antérieure à la Charte canadienne (1982) et reflète les valeurs québécoises. Un Québec souverain adopterait sa propre charte constitutionnelle, probablement plus forte. Autres États souverains (Suisse, Belgique, Danemark) protègent rigoureusement les droits. Les libertés fondamentales seraient mieux protégées, pas menacées.", "sources": ["Charte québécoise | https://www.quebec.ca/", "ONU droits | https://www.ohchr.org/"]}, {"id": 7, "category": "Emploi & Chômage", "claim": "« L'indépendance causerait une augmentation massive du chômage »", "context": "Prédiction d'effondrement de l'emploi post-référendaire.", "rebuttal": "Les données post-référendum 1995 montrent que le Québec a continué sa croissance d'emploi normalement. Micro-États (Luxembourg 4,6% chômage, Islande 3,8%, Belgique 5,6%) connaissent des taux de chômage parmi les plus bas mondiaux. Québec aurait finalement plus de contrôle pour développer politiques d'emploi adaptées. Aucune preuve économique d'augmentation chômage post-indépendance.", "sources": ["Statcan | https://www.statcan.gc.ca/", "OCDE | https://www.oecd.org/"]}, {"id": 8, "category": "Commerce International", "claim": "« Un Québec indépendant ne pourrait pas commercer avec le Canada »", "context": "Argument que les tarifs détruiraient le commerce.", "rebuttal": "Les échanges commerciaux entre États indépendants sont la norme mondiale (Canada-USA, Suisse-UE, Singapour-Malaysia). Un accord Québec-Canada pour le libre-échange serait inévitable car l'intérêt économique des deux côtés l'exige. Les chaînes d'approvisionnement intégrées poussent au libre-échange. Des modèles (ALÉNA, accords UE) montrent comment voisins indépendants maintiennent commerce intense.", "sources": ["OMC | https://www.wto.org/", "CIRANO | https://www.cirano.qc.ca/"]}, {"id": 9, "category": "Ressources Naturelles", "claim": "« Le Québec n'a pas assez de ressources naturelles »", "context": "Minimisation des actifs québécois.", "rebuttal": "Québec possède des ressources MAJEURES: hydroélectricité (1er producteur nord-américain, 15% électricité continent), forêts boréales (27% couvert forestier canadien), minéraux critiques (lithium, cobalt, nickel recherchés globalement), et eaux douces (15% réserves mondiales). Ces atouts stratégiques donnent à Québec énorme pouvoir économique et géopolitique. Les ressources ne manquent absolument pas.", "sources": ["Hydro-Québec | https://www.hydroquebec.com/", "Ressources naturelles Canada | https://www.rncan.gc.ca/"]}, {"id": 10, "category": "Immigration & Démographie", "claim": "« Le Québec perdrait le contrôle de l'immigration »", "context": "Crainte d'une immigration incontrôlée.", "rebuttal": "Québec contrôle DÉJÀ son immigration via l'Accord de 1991 avec Ottawa. Sélection des immigrants = Québec. Politique d'intégration = Québec. Taux immigration stable (~1% population/an). L'indépendance ne changerait rien au contrôle québécois sur l'immigration, le renforcerait même. Démographie stable selon projections ISQ. Aucun risque réel.", "sources": ["Immigration Québec | https://www.immigration-quebec.gouv.qc.ca/", "ISQ | https://www.stat.gouv.qc.ca/"]}, {"id": 11, "category": "Infrastructure", "claim": "« Le Québec ne pourrait pas maintenir ses infrastructures »", "context": "Dépendance perçue aux programmes fédéraux.", "rebuttal": "Québec contribue davantage aux programmes fédéraux qu'il ne reçoit en retour. Provinces australiennes, régions suisses, cantons belges gèrent leurs infrastructures seuls sans fédéral parent. Québec aurait revenues pour entretenir routes, ponts, transports, réseaux. Indépendance = plus de contrôle sur priorités infrastructure, meilleure efficacité.", "sources": ["Infrastructure Canada | https://www.infrastructure.gc.ca/", "Transports Québec | https://www.transports.gouv.qc.ca/"]}, {"id": 12, "category": "Langue & Culture", "claim": "« La culture québécoise perdrait en richesse et reconnaissance »", "context": "Argument que l'indépendance l'appauvrierait culturellement.", "rebuttal": "INVERSE VRAI. France protège culture française via subventions massives, quotas audiovisuels, politiques linguistiques. Québec souverain pourrait subventionner directement TV française, cinéma, musique, édition, théâtre. Liberté totale de politiques culturelles sans restrictions fédérales. Réseau diffusion culture québécoise s'agrandirait globalement. Indépendance RENFORCERAIT culture.", "sources": ["MCC France | https://www.culture.gouv.fr/", "BAKOM Suisse | https://www.bakom.admin.ch/"]}, {"id": 13, "category": "Gouvernance", "claim": "« Le fédéral est plus transparent que Québec »", "context": "Argument que le gouvernement central est plus redevable.", "rebuttal": "Transparency International 2023: Canada #12 mondial, Suisse #6, Nouvelle-Zélande #1. Petit gouvernement = plus transparent généralement. Scandales récents (SNC-Lavalin, arrive-t-il à justifier...) montrent Ottawa cache aussi. Petit gouvernement = accountability plus facile. Québec aurait transparence PLUS haute post-indépendance.", "sources": ["Transparency International | https://www.transparency.org/"]}, {"id": 14, "category": "Gouvernance", "claim": "« L'indépendance mènerait à l'instabilité gouvernementale »", "context": "Peur de coalitions fragiles sans majorité.", "rebuttal": "PAYS STABLES avec coalitions: Suisse coalitions depuis 1959, très stable. Belgique coalitions multilingues complexes, gouverne efficacement. Suède coalitions depuis 1976, prospère. Irlande coalitions fréquentes, économie forte. Coalitions FORCENT compromis = gouvernance meilleure, plus inclusive, moins sectaire. Instabilité n'est pas automatique.", "sources": ["OCDE | https://www.oecd.org/", "IPU | https://www.ipu.org/"]}, {"id": 15, "category": "Géopolitique", "claim": "« Le Québec n'aurait aucun poids diplomatique »", "context": "Argument que la souveraineté marginaliserait le Québec internationalement.", "rebuttal": "Petits États (Luxembourg 0.67M habitants, Malte 0.53M) ont poids diplomatique considérable à l'ONU, l'UE, l'OMC, forums mondiaux. Québec (8.5M) serait significativement plus grand. Pourrait siéger directement à l'ONU (200+ sièges), Francophonie (88 pays), OMC, accords bilatéraux directs. Poids diplomatique proportionnel population + PIB.", "sources": ["Ministère Affaires étrangères Suisse | https://www.eda.admin.ch/", "ONU | https://www.un.org/"]}, {"id": 16, "category": "Innovation & Technologie", "claim": "« Le secteur tech québécois dépend complètement du fédéral »", "context": "Minimisation des innovations québécoises.", "rebuttal": "Québec leader RECONNU: jeux vidéo (Ubisoft, Square Enix, Behaviour Digital), IA (Mila mondialement reconnu), aérospatiale (Bombardier). Ces secteurs sont COMPÉTITIFS MALGRÉ restrictions fédérales. Souveraineté = réduire taxes sur R&D, allocations directes pour innovation, régulations flexibles pour startups. Écosystème tech québécois s'amplifierait.", "sources": ["Mila | https://mila.quebec/", "Ubisoft | https://www.ubisoft.com/"]}, {"id": 17, "category": "Électricité & Énergie", "claim": "« Le Québec ne pourrait pas exporter son électricité »", "context": "Argument que marchés USA/Canada dépendent entièrement du fédéral.", "rebuttal": "Hydro-Québec EXPORTE DÉJÀ vers USA via contrats directs bilatéraux, pas via Ottawa. États américains (Californie, Massachusetts, New York) négocient directement électricité avec provinces/pays. Québec aurait accès à marchés USA PLUS grands directement post-indépendance. Demande électricité continue croître (véhicules électriques, batteries).", "sources": ["Hydro-Québec | https://www.hydroquebec.com/", "NEISO | https://www.neiso.com/"]}, {"id": 18, "category": "Éducation", "claim": "« Les universités québécoises perdraient leurs accréditations internationales »", "context": "Peur que les diplômes ne soient reconnus internationalement.", "rebuttal": "Universités québécoises (McGill, Université de Montréal, HEC Montréal) sont DÉJÀ reconnues mondialement dans classements (Top 500 QS, Times Higher Education). L'accréditation repose sur qualité recherche/enseignement, PAS sur statut politique. Universités suisses, belges, danoises sont mondialement reconnues. Indépendance n'affecte pas reconnaissance.", "sources": ["Association Universités Canada | https://www.univcan.ca/", "QS Rankings | https://www.topuniversities.com/"]}, {"id": 19, "category": "Santé", "claim": "« Le système de santé québécois s'effondrerait »", "context": "Crainte que les services se détériorent.", "rebuttal": "Québec gère DÉJÀ complètement son système de santé (Loi 101). Services universels établis, populaires, stables. Indépendance donnerait plus de flexibilité pour adapter politiques aux besoins québécois. Pays nordiques (Suède, Danemark, Suisse) ont meilleurs systèmes santé mondiaux. Québec pourrait améliorer système post-indépendance.", "sources": ["Ministère Santé Québec | https://www.quebec.ca/", "Santé Canada | https://www.canada.ca/fr/"]}, {"id": 20, "category": "Transports & Infrastructure", "claim": "« Québec ne pourrait pas gérer les transports publics »", "context": "Argument que c'est trop complexe pour une province.", "rebuttal": "Québec gère DÉJÀ: métro Montréal, STM, REM, transports régionaux (Gaspésie, Laurentides). Villes comme Zurich, Copenhague, Singapour gèrent transits urbains excellents. Indépendance = plus de contrôle, meilleure intégration transit. Québec aurait autonomie totale pour développer réseau transport public de classe mondiale.", "sources": ["STM | https://www.stm.info/", "Ministère Transports | https://www.transports.gouv.qc.ca/"]}, {"id": 21, "category": "Souveraineté Alimentaire", "claim": "« Québec ne pourrait pas nourrir sa population »", "context": "Argument que l'agriculture serait insuffisante.", "rebuttal": "Québec produit $2.8 milliards agriculture annuellement. Agriculture prospère déjà. Indépendance = tarifs protectionnistes (modèle France via UE), subventions directes agriculteurs, marchés augmentent. Terroirs québécois recherchés (sirop érable, fromages, cidres, vins). Souveraineté alimentaire serait PLUS forte post-indépendance.", "sources": ["MAPAQ | https://www.mapaq.gouv.qc.ca/", "Statcan Agriculture | https://www.statcan.gc.ca/"]}, {"id": 22, "category": "Télécommunications", "claim": "« Internet et le cellulaire seraient beaucoup plus chers »", "context": "Peur que les télécommunications deviennent impossiblement coûteuses.", "rebuttal": "Télécommunications gérées par industries privées (Bell, Telus, Rogers). Indépendance permettrait régulation PLUS stricte, compétition accrue, prix meilleur marché. Suisse, Belgique, Pays-Bas ont accès internet meilleur marché que Canada. Régulation autonome québécoise favoriserait consommateurs.", "sources": ["CRTC | https://crtc.gc.ca/", "Industrie Canada | https://www.canada.ca/fr/"]}, {"id": 23, "category": "Justice & Droit", "claim": "« Les droits de la défense seraient compromis »", "context": "Peur que le système judiciaire se détériore.", "rebuttal": "Barreau du Québec est indépendant depuis longtemps. Québec gère déjà ses cours (Cour supérieure, Cour d'appel, Cour provincial). Petites nations (Suisse, Belgique) ont excellents systèmes de défense professionnels. Indépendance = plus de ressources pour justice, moins de congestion. Droits constitutionnels seraient protégés mieux.", "sources": ["Barreau du Québec | https://www.barreau.qc.ca/", "Conseil Europe | https://www.coe.int/"]}, {"id": 24, "category": "Peuples autochtones", "claim": "« Les Autochtones s'opposeront farouchement à la souveraineté »", "context": "Argument que les Innus, Cris bloqueraient indépendance.", "rebuttal": "Diversité d'opinions chez Autochtones. Certaines nations négocient déjà avec Québec (Innus, Atikamekw). Modèle Belgique: autonomie régionale + minorités = paix durable. Québec indépendant offrirait autonomie gouvernementale directe aux nations autochtones, MEILLEURS droits territoriales. Consultation libre = fondamentale.", "sources": ["AFN | https://www.afn.ca/"]}, {"id": 25, "category": "Données Économiques", "claim": "« Les modèles économiques de l'indépendance sont inconsistants »", "context": "Argument que les analyses pro-indépendance sont biaisées.", "rebuttal": "ÉTUDES PEER-REVIEWED: UQAM 2019 = viable, croissance +1-2%/an. McGill analyses = net POSITIF long-terme. CIRANO = surplus budgétaire possible. Université Laval = transition emploi minimal. Rapports contradictoires viennent surtout fédéralistes. Evidence scientifique soutient viabilité économique.", "sources": ["UQAM | https://www.uqam.ca/", "McGill | https://www.mcgill.ca/", "CIRANO | https://www.cirano.qc.ca/"]}, {"id": 26, "category": "Fiscalité & Impôts", "claim": "« Les impôts augmenteraient considérablement »", "context": "Peur d'une hausse fiscale massive.", "rebuttal": "Québec aurait accès à TOUS revenus fiscaux (impôts particuliers, corporatifs, TPS, accise, carbone). Actuellement, Ottawa redistribue certains revenus. Indépendance = plus de revenus avec taux identiques possibles. Belgique, Suisse ont fiscalité compétitive malgré indépendance. Tarifs pourraient même BAISSER avec efficacité.", "sources": ["Finances Canada | https://www.canada.ca/fr/", "OCDE Taxes | https://www.oecd.org/"]}, {"id": 27, "category": "Comparaisons Internationales", "claim": "« Aucun petit État n'a réussi indépendamment »", "context": "Minimisation systématique des modèles viables.", "rebuttal": "FAUX. Luxembourg PIB/capita $140K. Singapour $72K. Islande $100K, 100% renouvelable. Malte $42K, tourism forte. Estonie $34K, transformation numérique leader. Slovénie $34K, indépendance 1991 = prospérité. Tous RÉUSSISSENT comme États indépendants. Québec (8.5M) bien PLUS grand = avantages supplémentaires.", "sources": ["FMI | https://www.imf.org/", "Banque mondiale | https://data.worldbank.org/"]}, {"id": 28, "category": "Historique & Promesses", "claim": "« Ottawa a toujours respecté ses promesses envers Québec »", "context": "Mise en question de la fiabilité fédérale.", "rebuttal": "PROMESSES NON TENUES: 1867 'Égalité deux peuples' jamais appliquée = anglais dominant. 1982 Meech rejeté = patriation sans consentement QC. Charlottetown rejeté. COVID-19 transferts santé promis $2B, versés $500M. Loi 21 contestée fédéralement. Pattern: promesses faites, oubliées après élections.", "sources": ["Archives nationales | https://www.bac-lac.gc.ca/"]}, {"id": 29, "category": "Doubles-standards", "claim": "« Le fédéral traite Québec équitablement comme autres provinces »", "context": "Déni des inégalités dans le traitement des provinces.", "rebuttal": "PREUVES MANIFESTES: Infrastructure Ontario reçoit 2x plus per capita que Québec. Subventions agricoles favorisent Prairies (Alberta, Saskatchewan). Contrats fédéraux: 50% Ontario/Colombie (28% population), 20% Québec (23% population). CRTC favorise diffuseurs canadiens-anglais. Traitement systématiquement inégal documenté.", "sources": ["IRPP | https://irpp.org/", "Infrastructure Canada | https://www.infrastructure.gc.ca/"]}, {"id": 30, "category": "Constitution", "claim": "« Québec a véritable autonomie dans la Confédération »", "context": "Argument que les pouvoirs provinciaux sont suffisants.", "rebuttal": "Québec SANS CONSTITUTION PROPRE. Charte canadienne (1982) Québec n'a JAMAIS signée = réserve. Notwithstanding clause: Ottawa peut overrider Québec. Cour suprême Canada souvent anglo-dominée dans jugements. Pouvoir dépenser fédéral contourne autonomie. Autonomie véritable = constitutionelle", "sources": ["Constitution Canada | https://laws-lois.justice.gc.ca/"]}, {"id": 31, "category": "Secteur Maritime", "claim": "« Québec perdrait accès aux pécheries océaniques »", "context": "Argument que la frontière maritime serait fermée.", "rebuttal": "Pêcheries sont négociées entre États souverains (modèle: Canada-USA pêche partagée). Québec aurait droits légaux sur eaux territoriales (12 milles nautiques). Accords internationaux (UNCLOS) permettent accès partagé. Islande, Norvège, Danemark gèrent pêcheries prospères indépendamment.", "sources": ["Ressources naturelles Canada | https://www.rncan.gc.ca/", "Pêches Québec | https://www.quebec.ca/"]}, {"id": 32, "category": "Tourisme & Patrimoine", "claim": "« Le tourisme québécois s'effondrerait, attractions quitteraient »", "context": "Peur que les touristes évitent un Québec indépendant.", "rebuttal": "Tourisme = industrie mondiale, peu affectée politique. Montréal, Québec-Ville sont attractions établies mondialement. Suisse, Belgique, Danemark (indépendantes) BOOSTENT tourisme post-autonomie. UNESCO sites (Vieux-Québec, Laurentides) protégés. Indépendance = plus marketing international, tourisme AUGMENTE.", "sources": ["Tourisme Québec | https://www.quebec.ca/", "UNESCO | https://whc.unesco.org/"]}, {"id": 33, "category": "Environnement & Énergie", "claim": "« Québec ne pourrait pas atteindre objectifs climatiques ambitieux »", "context": "Argument que les ententes fédérales sont nécessaires.", "rebuttal": "Québec gère DÉJÀ politique environnementale (air, eau, déchets). Hydroélectricité = 100% bas-carbone (95% électricité renouvelable). Indépendance = standards environnementaux PLUS ambitieux possibles, sans frein fédéral. Suisse, Belgique, Danemark négocient accords climatiques directement. Québec plus libre agir.", "sources": ["Environnement Québec | https://www.quebec.ca/", "Accord Paris | https://unfccc.int/"]}, {"id": 34, "category": "Francophones Mondiaux", "claim": "« Québec perdrait son influence auprès des francophones mondiaux »", "context": "Argument que le prestige international diminuerait.", "rebuttal": "Québec pourrait siéger à Francophonie directement (88 pays), pas via Canada. Belgique, Suisse, Luxembourg siègent Francophonie comme membres de plein droit. Influence ACCRUE par indépendance. Relations bilatérales directes avec France, Afrique francophone, Haïti. Québec deviendrait leader francophone nord-américain.", "sources": ["Organisation Francophonie | https://www.francophonie.org/", "Relations France | https://www.france-diplomatie.gouv.fr/"]}, {"id": 35, "category": "Marché du Travail", "claim": "« Les salaires augmenteraient sans bénéfices économiques réels »", "context": "Argument que l'indépendance = inflation sans gains.", "rebuttal": "Luxembourg PIB/capita $140K, salaires très hauts, stable. Suisse salaires +40% vs Canada, prospère. Irlande salaires +35% depuis indépendance fiscale réussie. Québec: réduction impôts corporatifs → attractivité → emplois → salaires augmentent. Bénéfices réels documentés petites nations.", "sources": ["OCDE | https://www.oecd.org/", "Statcan | https://www.statcan.gc.ca/"]}, {"id": 36, "category": "Sports & Loisirs", "claim": "« Québec ne pourrait pas soutenir les équipes professionnelles »", "context": "Peur que les franchises sportives quittent.", "rebuttal": "Sports = business privé global. Canadiens, Impact Montréal sont marques établies internationalement, pas dépendants fédéral. Suisse (Bâle, Zurich), Belgique, Danemark ont excellentes équipes pro. Indépendance = plus de contrôle politique, meilleur soutien. Sports québécois prospéreraient.", "sources": ["Ligue Hockey | https://www.nhl.com/", "MLS | https://www.mlssoccer.com/"]}, {"id": 37, "category": "Représentation Politique", "claim": "« Québec n'aurait pas de voix à l'Organisation des Nations Unies »", "context": "Argument que le Québec serait sans représentation.", "rebuttal": "Chaque État indépendant a droit constitutionnel à siège à l'ONU. Luxembourg, Malte, Chypre, Estonie (plus petits que Québec) y siègent actuellement. Québec serait probablement membre fondateur (ONU admet ~200 États). Voix garantie internationalement via statut souverainté.", "sources": ["ONU | https://www.un.org/", "Charte ONU | https://www.un.org/fr/"]}, {"id": 38, "category": "Bilinguisme", "claim": "« L'anglais disparaîtrait complètement au Québec »", "context": "Peur que la minorité anglophone soit marginalisée totalement.", "rebuttal": "Québec indépendant aurait Charte protégeant langues minoritaires (modèle Belgique = français-néerlandais coexistent, Suisse = 4 langues officielles). Communautés anglophones seraient protégées constitutionnellement. Bilinguisme de facto resterait établi. Minorités prospèrent avec autonomie/protection.", "sources": ["Charte Québec | https://www.quebec.ca/", "Conseil Europe | https://www.coe.int/"]}, {"id": 39, "category": "Services Financiers", "claim": "« Les banques quitteraient Québec »", "context": "Peur d'une fuite des institutions financières.", "rebuttal": "Banques opèrent globalement pour profits. RBC, TD, Scotiabank ont opérations mondialement. Stabilité politique/économique les retient, pas fédéralisme. Singapour, Luxembourg, Suisse sont HUBS financiers majeurs indépendants. Québec prospérerait centre financier post-indépendance.", "sources": ["Banque Canada | https://www.bankofcanada.ca/", "Banque Mondiale | https://www.worldbank.org/"]}, {"id": 40, "category": "Intégration Économique", "claim": "« Québec serait isolé économiquement »", "context": "Argument que les chaînes d'approvisionnement se briseraient.", "rebuttal": "Chaînes d'approvisionnement = pragmatiques, survivent indépendance politique. Canada-USA commerce 2x indépendants politiquement, commerce intense. Québec-Canada commerce continuerait (intérêt mutuels). Intégration économique est VOLONTAIRE/nécessaire, pas imposée par fédéral.", "sources": ["OMC | https://www.wto.org/", "Commerce Canada | https://www.canada.ca/fr/"]}, {"id": 41, "category": "Protocoles Sanitaires", "claim": "« Québec ne pourrait pas établir normes sanitaires rigoureuses »", "context": "Peur que les standards baissent.", "rebuttal": "Québec gère DÉJÀ normes santé (Loi 101, MAPAQ). Indépendance = normes PLUS strictes possibles. Pays nordiques (Suède, Danemark) ont normes sanitaires parmi meilleures mondialement. Québec pourrait aligner standards sur EU (plus hauts que Canada). Santé protégée mieux.", "sources": ["Santé Québec | https://www.quebec.ca/", "OMS | https://www.who.int/"]}, {"id": 42, "category": "Accords Commerciaux", "claim": "« Québec ne pourrait pas négocier d'accords commerciaux »", "context": "Argument que les marchés seraient fermés.", "rebuttal": "États indépendants négocient traités commerciaux directement (modèle: Canada-ALÉNA-USMCA). Québec aurait pouvoir de négociation direct avec USA, Europe, ASEAN, Asia. Accès à marchés AUGMENTERAIT via négociations bilatérales. Suisse négocie 150+ accords commerciaux.", "sources": ["OMC | https://www.wto.org/", "ALÉNA | https://www.alena.ca/"]}, {"id": 43, "category": "Secteur Manufacturier", "claim": "« Les usines manufacturières quitteraient Québec »", "context": "Peur d'une désindustrialisation massive.", "rebuttal": "Manufacture = pragmatique basée coûts/stabilité. Toyota, BMW, Siemens opèrent partout globalement. Québec offrirait stabilité politique, coûts compétitifs, main-d'œuvre qualifiée. Indépendance = plus d'investissements manufacturiers, pas moins. Incentives fiscaux autonomes.", "sources": ["Statcan Manufacturing | https://www.statcan.gc.ca/", "Industrie Canada | https://www.canada.ca/fr/"]}, {"id": 44, "category": "Qualité de Vie", "claim": "« La qualité de vie baisserait drastiquement »", "context": "Argument général que les Québécois seraient moins heureux.", "rebuttal": "Indice bonheur ONU: petits États (Danemark #1, Finlande #2, Suisse #4) sont PLUS heureux que Canada (#15). Contrôle démocratique direct = satisfaction. Québec aurait + contrôle lois, culture, économie = happiness augmente. Démocratie/autonomie = clés bonheur.", "sources": ["ONU Bonheur | https://worldhappiness.report/", "Statcan Satisfaction | https://www.statcan.gc.ca/"]}, {"id": 45, "category": "Régulation Environnementale", "claim": "« Les normes environnementales s'affaibliraient »", "context": "Peur d'une dégradation écologique.", "rebuttal": "Québec gère DÉJÀ régulation environnementale (MELCCFP, MAPAQ). Indépendance = normes PLUS strictes possibles. Hydro-électricité = atout clé durabilité. France, Suisse, Belgique ont normes environnementales strictes sans fédéral parent. Québec prospérerait écologiquement autonome.", "sources": ["MELCCFP | https://www.quebec.ca/", "ONU Environnement | https://www.unep.org/"]}, {"id": 46, "category": "Fusion Bureaucratique", "claim": "« La bureaucratie augmenterait énormément »", "context": "Argument que les gouvernements se doubleraient.", "rebuttal": "Actuellement Québec + Ottawa = double bureaucratie superposée. Indépendance = UNE seule administration, pas deux. Résultat: MOINS bureaucratie, plus d'efficacité, moins de duplication. Suisse, Belgique: structures bureaucratiques simples efficaces. Québec bénéficierait réduction bureaucratie.", "sources": ["OCDE Efficacité | https://www.oecd.org/", "Gouvernance Suisse | https://www.admin.ch/"]}, {"id": 47, "category": "Investissements Étrangers", "claim": "« Les investisseurs fuyaient un Québec indépendant »", "context": "Peur que le capital international se retire massivement.", "rebuttal": "Investisseurs cherchent stabilité politique + rendements économiques. Québec offre les deux. Singapour, Luxembourg, Dubai attirent investissements MASSIFS comme États indépendants. Stabilité prévisible > fédéralisme ambigu. Indépendance claire = attire capital international.", "sources": ["FDI Intel | https://www.fdiintelligence.com/", "Banque mondiale | https://data.worldbank.org/"]}, {"id": 48, "category": "Représentation Politique", "claim": "« Le fédéral respecte l'autonomie provinciale Québec »", "context": "Affirmation que les pouvoirs provinciaux sont respectés.", "rebuttal": "VIOLATIONS DOCUMENTÉES: Imposition Charte 1982 CONTRE vote Québec. Pouvoir dépenser fédéral bypasse provinces. Réserves autochtones: Ottawa bypasse Québec. Environnement: standards ignore réalités QC. Langue: CPP refuse français. Pattern: non-respect autonomie.", "sources": ["Charte Canada | https://laws-lois.justice.gc.ca/", "Constitution 1867 | https://laws-lois.justice.gc.ca/"]}, {"id": 49, "category": "Identité & Citoyenneté", "claim": "« Une identité québécoise serait fragmentée »", "context": "Peur que l'indépendance crée divisions internes.", "rebuttal": "Indépendance RENFORCE identité collective. Québec a identité distinct DÉJÀ. Indépendance = formalisation, pas création divisions. Petit État = cohésion identitaire plus forte. Islande, Luxembourg: identité très forte post-indépendance. Québécois s'unirait davantage.", "sources": ["ISQ | https://www.stat.gouv.qc.ca/", "OQLF | https://www.oqlf.gouv.qc.ca/"]}, {"id": 50, "category": "Aérospatiale & Défense", "claim": "« Bombardier quitterait Québec immédiatement »", "context": "Peur de perte massive d'emplois dans l'aérospatiale.", "rebuttal": "Bombardier contrats GLOBAUX (Europe, Asie, USA), pas fédéraux. Marchés publics européens/américains > marché fédéral. Tarifs avec Canada-USA restent attractifs. Emplois SÉCURISÉS. Indépendance = plus soutien R&D aérospatiale. Québec hub aéro mondialement.", "sources": ["Bombardier | https://www.bombardier.com/", "Commerce Canada | https://www.canada.ca/fr/"]}
];

let allDebunks = [...debunks];
let filteredDebunks = [...debunks];

function initApp() {
  renderStats();
  renderSidebar();
  renderDebunks();
  populateCategoryFilter();
}

function renderStats() {
  const statsDiv = document.getElementById('stats');
  const categories = new Set(allDebunks.map(d => d.category)).size;
  const sources = allDebunks.reduce((sum, d) => sum + d.sources.length, 0);
  
  statsDiv.innerHTML = `
    <div class="stat-card"><div class="stat-number">${allDebunks.length}</div><div class="stat-label">Débunks</div></div>
    <div class="stat-card"><div class="stat-number">${categories}</div><div class="stat-label">Catégories</div></div>
    <div class="stat-card"><div class="stat-number">${sources}</div><div class="stat-label">Sources</div></div>
  `;
}

function renderSidebar() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const sidebar = document.getElementById('sidebar');
  
  sidebar.innerHTML = `
    <div class="sidebar-section">
      <div class="sidebar-title">Catégories</div>
      <button class="sidebar-btn active" onclick="filterBySidebar(null)">Tous</button>
      ${categories.map(cat => `<button class="sidebar-btn" onclick="filterBySidebar('${cat}')">${cat}</button>`).join('')}
    </div>
  `;
}

function populateCategoryFilter() {
  const categories = [...new Set(allDebunks.map(d => d.category))].sort();
  const select = document.getElementById('categoryFilter');
  select.innerHTML = '<option value="">Toutes les catégories</option>' + categories.map(cat => `<option value="${cat}">${cat}</option>`).join('');
}

function filterBySidebar(cat) {
  document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('categoryFilter').value = cat || '';
  filterDebunks();
}

function filterDebunks() {
  const search = document.getElementById('search').value.toLowerCase();
  const category = document.getElementById('categoryFilter').value;
  
  filteredDebunks = allDebunks.filter(d => {
    const matchCat = !category || d.category === category;
    const matchSearch = !search || d.claim.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });
  
  renderDebunks();
}

function renderDebunks() {
  const list = document.getElementById('debunk-list');
  const empty = document.getElementById('empty-state');
  
  if (filteredDebunks.length === 0) {
    list.style.display = 'none';
    empty.style.display = 'block';
    empty.innerHTML = '<h2>Aucun résultat</h2>';
    return;
  }
  
  list.style.display = 'grid';
  empty.style.display = 'none';
  list.innerHTML = filteredDebunks.map(d => `<div class="card" onclick="showDetail(${d.id})"><div class="badge">${d.category}</div><h3 class="card-title">${d.claim}</h3><div class="card-meta">📌 ${d.sources.length} source(s)</div></div>`).join('');
}

function showDetail(id) {
  const debunk = allDebunks.find(d => d.id === id);
  if (!debunk) return;
  
  document.getElementById('debunk-list').style.display = 'none';
  const detail = document.getElementById('detail-view');
  detail.innerHTML = `
    <button class="btn-secondary" onclick="backToList()">← Retour</button>
    <div class="detail-header"><span class="badge">${debunk.category}</span><h1>${debunk.claim}</h1></div>
    <div class="detail-section"><h3>📍 Contexte</h3><p>${debunk.context}</p></div>
    <div class="detail-section"><h3>✅ Réfutation (50-100 mots)</h3><p>${debunk.rebuttal}</p></div>
    <div class="detail-section"><h3>📚 Sources</h3><ul class="sources-list">${debunk.sources.map(s => {const parts = s.split(' | '); return `<li><strong>${parts[0]}</strong>${parts[1] ? ` <a href="${parts[1]}" target="_blank">🔗</a>` : ''}</li>`;}).join('')}</ul></div>
    <div style="display: flex; gap: 1rem;"><button class="btn-secondary" onclick="openEditModal(${id})">Éditer</button><button class="btn-secondary" onclick="deleteDebunk(${id})" style="color: #d32f2f;">Supprimer</button></div>
  `;
  detail.classList.add('show');
}

function backToList() {
  document.getElementById('detail-view').classList.remove('show');
  document.getElementById('debunk-list').style.display = 'grid';
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Ajouter un débunk';
  ['form-category', 'form-claim', 'form-context', 'form-rebuttal', 'form-sources'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const debunk = allDebunks.find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Éditer ce débunk';
  document.getElementById('form-category').value = debunk.category;
  document.getElementById('form-claim').value = debunk.claim;
  document.getElementById('form-context').value = debunk.context;
  document.getElementById('form-rebuttal').value = debunk.rebuttal;
  document.getElementById('form-sources').value = debunk.sources.join('\n');
  document.getElementById('modal').dataset.editId = id;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
function openImportModal() { document.getElementById('import-modal').classList.add('open'); document.getElementById('import-json').value = ''; document.getElementById('import-file').value = ''; document.getElementById('import-result').style.display = 'none'; }
function closeImportModal() { document.getElementById('import-modal').classList.remove('open'); }

function processImport() {
  const jsonText = document.getElementById('import-json').value.trim();
  const fileInput = document.getElementById('import-file');
  const resultDiv = document.getElementById('import-result');
  
  if (jsonText) {
    try { mergeDebunks(JSON.parse(jsonText), resultDiv); } 
    catch (err) { showImportResult(resultDiv, 'error', `Erreur: ${err.message}`); }
  } else if (fileInput.files.length > 0) {
    const reader = new FileReader();
    reader.onload = (e) => {
      try { mergeDebunks(JSON.parse(e.target.result), resultDiv); } 
      catch (err) { showImportResult(resultDiv, 'error', `Erreur: ${err.message}`); }
    };
    reader.readAsText(fileInput.files[0]);
  } else {
    showImportResult(resultDiv, 'error', 'Colle du JSON ou upload un fichier');
  }
}

function mergeDebunks(newDebunks, resultDiv) {
  if (!Array.isArray(newDebunks)) { showImportResult(resultDiv, 'error', 'Format invalide'); return; }
  
  const existingIds = new Set(allDebunks.map(d => d.id));
  const toAdd = newDebunks.filter(d => !existingIds.has(d.id));
  
  if (toAdd.length === 0) { showImportResult(resultDiv, 'error', 'Aucun nouveau débunk'); return; }
  
  allDebunks = [...allDebunks, ...toAdd];
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  
  showImportResult(resultDiv, 'success', `✅ ${toAdd.length} débunks ajoutés! Total: ${allDebunks.length}`);
  setTimeout(() => closeImportModal(), 2000);
}

function showImportResult(resultDiv, type, message) {
  resultDiv.style.display = 'block';
  resultDiv.className = type === 'success' ? 'import-success' : 'import-error';
  resultDiv.textContent = message;
}

function saveDebunk() {
  const category = document.getElementById('form-category').value.trim();
  const claim = document.getElementById('form-claim').value.trim();
  const context = document.getElementById('form-context').value.trim();
  const rebuttal = document.getElementById('form-rebuttal').value.trim();
  const sourceText = document.getElementById('form-sources').value.trim();
  
  if (!category || !claim || !rebuttal) { alert('Remplissez tous les champs'); return; }
  
  const sources = sourceText.split('\n').filter(s => s.trim());
  const editId = document.getElementById('modal').dataset.editId;
  
  if (editId) {
    const idx = allDebunks.findIndex(d => d.id == editId);
    allDebunks[idx] = { ...allDebunks[idx], category, claim, context, rebuttal, sources };
  } else {
    allDebunks.push({
      id: Math.max(...allDebunks.map(d => d.id), 0) + 1,
      category, claim, context, rebuttal, sources
    });
  }
  
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  closeModal();
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
}

function deleteDebunk(id) {
  if (!confirm('Supprimer?')) return;
  allDebunks = allDebunks.filter(d => d.id !== id);
  localStorage.setItem('debunks', JSON.stringify(allDebunks));
  renderStats();
  renderSidebar();
  populateCategoryFilter();
  filterDebunks();
  backToList();
}

document.getElementById('search').addEventListener('input', filterDebunks);
initApp();
</script>
</body>
</html>
