<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Wiki collaboratif pour débunker les affirmations fallacieuses du gouvernement canadien concernant la souveraineté du Québec.">
<meta name="og:title" content="Wiki Debunks — Souveraineté">
<meta name="og:description" content="Base de données collaborative de réfutations documentées sur les enjeux de souveraineté québécoise.">
<title>Wiki Debunks — Souveraineté</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #222; background: #f5f5f5; }
a { color: #0066cc; text-decoration: none; }
a:hover { text-decoration: underline; }
button { font-family: inherit; cursor: pointer; border: none; background: #fff; color: #222; border: 1px solid #ddd; border-radius: 6px; padding: 0.5rem 1rem; transition: all 0.2s; }
button:hover { background: #f0f0f0; border-color: #999; }
input, textarea { font-family: inherit; padding: 0.5rem; border: 1px solid #ddd; border-radius: 6px; color: #222; background: #fff; }
input:focus, textarea:focus { outline: none; border-color: #0066cc; box-shadow: 0 0 0 2px rgba(0,102,204,0.1); }

@media (prefers-color-scheme: dark) {
  body { color: #e0e0e0; background: #1a1a1a; }
  input, textarea { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
  button { background: #2a2a2a; color: #e0e0e0; border-color: #444; }
  button:hover { background: #333; }
  .container > main { background: #1a1a1a; }
  .debunk-item { background: #2a2a2a; border-color: #444; }
  .debunk-item:hover { border-color: #666; }
  .debunk-detail { background: #2a2a2a; }
  .debunk-category { background: #333; color: #aaa; }
  .sources { background: #333; border-color: #555; }
  aside { background: #252525; border-color: #444; }
  header { background: #252525; border-color: #444; }
  .modal-content { background: #2a2a2a; }
}

.container { display: flex; flex-direction: column; height: 100vh; }
header { background: #fff; padding: 1rem; border-bottom: 1px solid #ddd; }
header h1 { font-size: 20px; font-weight: 600; margin-bottom: 0.75rem; }
.search-bar { display: flex; gap: 0.5rem; }
.search-bar input { flex: 1; }

main { display: flex; flex: 1; overflow: hidden; }
aside { width: 180px; background: #fafafa; overflow-y: auto; padding: 1rem; border-right: 1px solid #ddd; }
.category { margin-bottom: 1rem; }
.category h3 { font-size: 11px; font-weight: 600; text-transform: uppercase; color: #666; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
.category button { display: block; width: 100%; text-align: left; background: transparent; border: none; padding: 0.5rem 0.5rem; font-size: 13px; margin-bottom: 0.25rem; border-radius: 4px; }
.category button:hover { background: #e8e8e8; }
.category button.active { background: #e8e8e8; font-weight: 500; }

.content { flex: 1; overflow-y: auto; padding: 1.5rem; }
.debunk-item { background: #fff; border: 1px solid #ddd; border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; cursor: pointer; transition: all 0.2s; }
.debunk-item:hover { border-color: #0066cc; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.debunk-item.active { border-color: #0066cc; background: #f9f9f9; }
.debunk-claim { font-weight: 500; font-size: 14px; margin-bottom: 0.5rem; }
.debunk-meta { font-size: 12px; color: #666; }
.debunk-category { display: inline-block; background: #f0f0f0; padding: 0.25rem 0.75rem; border-radius: 12px; margin-right: 0.5rem; font-size: 12px; font-weight: 500; }

.debunk-detail { display: none; }
.debunk-detail.show { display: block; }
.debunk-detail h2 { font-size: 18px; margin-bottom: 1.5rem; font-weight: 600; }
.section { margin-bottom: 1.5rem; }
.section h3 { font-size: 12px; font-weight: 600; text-transform: uppercase; color: #666; margin-bottom: 0.75rem; letter-spacing: 0.5px; }
.section p { line-height: 1.6; margin-bottom: 0.5rem; }
.sources { padding: 1rem; background: #f9f9f9; border-left: 3px solid #0066cc; border-radius: 4px; }
.source { font-size: 13px; margin-bottom: 0.75rem; }
.source a { color: #0066cc; }

.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; }
.modal.open { display: flex; }
.modal-content { background: #fff; border-radius: 8px; padding: 2rem; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.modal-content h2 { margin-bottom: 1.5rem; font-size: 18px; font-weight: 600; }
.form-group { margin-bottom: 1.25rem; }
.form-group label { display: block; font-weight: 500; margin-bottom: 0.5rem; font-size: 13px; }
.form-group input, .form-group textarea { width: 100%; }
.modal-buttons { display: flex; gap: 0.75rem; margin-top: 1.5rem; }
.btn-primary { background: #0066cc; color: #fff; border-color: #0066cc; font-weight: 500; }
.btn-primary:hover { background: #0052a3; }

@media (prefers-color-scheme: dark) {
  .modal-content { background: #2a2a2a; }
}

@media (max-width: 768px) {
  main { flex-direction: column; }
  aside { width: 100%; border-right: none; border-bottom: 1px solid #ddd; max-height: 120px; overflow-x: auto; display: flex; gap: 1rem; padding: 0.75rem; }
  .category { display: flex; gap: 0.75rem; margin: 0; flex-wrap: nowrap; }
  .category h3 { display: none; }
  .category button { flex-shrink: 0; white-space: nowrap; }
  .content { padding: 1rem; }
  .modal-content { width: 95%; padding: 1.5rem; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Wiki Debunks — Souveraineté</h1>
    <div class="search-bar">
      <input type="text" id="search" placeholder="Chercher...">
      <button onclick="openAddModal()">+ Ajouter</button>
    </div>
  </header>

  <main>
    <aside id="sidebar"></aside>
    <div class="content">
      <div id="debunk-list"></div>
      <div id="debunk-detail" class="debunk-detail"></div>
    </div>
  </main>
</div>

<div class="modal" id="modal">
  <div class="modal-content">
    <h2 id="modal-title">Ajouter un debunk</h2>
    <div class="form-group">
      <label>Catégorie</label>
      <input type="text" id="form-category" placeholder="ex: Économie, Transferts, Fiscalité...">
    </div>
    <div class="form-group">
      <label>Affirmation (ce qui est faux)</label>
      <textarea id="form-claim" placeholder="Entrez l'affirmation à débunker..." rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Contexte</label>
      <textarea id="form-context" placeholder="Qui l'a dite? Quand? Où?" rows="2"></textarea>
    </div>
    <div class="form-group">
      <label>Réfutation</label>
      <textarea id="form-rebuttal" placeholder="L'explication et les faits qui contredisent..." rows="4"></textarea>
    </div>
    <div class="form-group">
      <label>Sources (Titre | URL, une par ligne)</label>
      <textarea id="form-sources" placeholder="Statistiques Canada | https://...\nRapport IRPP | https://..." rows="3"></textarea>
    </div>
    <div class="modal-buttons">
      <button onclick="closeModal()">Annuler</button>
      <button class="btn-primary" onclick="saveDebunk()">Publier</button>
    </div>
  </div>
</div>

<script>
let debunks = JSON.parse(localStorage.getItem('debunks')) || [
  {
    "id": 1,
    "category": "Transferts",
    "claim": "« Le Québec reçoit plus en transferts fédéraux que ce qu'il contribue »",
    "context": "Affirmation commune pour justifier l'importance du fédéralisme.",
    "rebuttal": "Faux. Les transferts en santé et éducation sont basés sur les populations; le Québec contribue davantage en impôts qu'il ne reçoit. Selon l'Institut de recherche en politiques publiques (IRPP), le Québec paie environ 18-20 % des impôts fédéraux pour ~23 % de la population.",
    "sources": [
      "IRPP - Fiscal Federalism | https://irpp.org/",
      "Statistiques Canada | https://www.statcan.gc.ca/"
    ]
  },
  {
    "id": 2,
    "category": "Économie",
    "claim": "« Un Québec indépendant ne pourrait pas monétiser sa dette »",
    "context": "Argument utilisé pour dire que la souveraineté causerait une crise économique.",
    "rebuttal": "Le Québec aurait accès aux marchés de capitaux, à un bilan solide, et à des institutions. D'autres petites économies (Suède, Norvège, Nouvelle-Zélande) démontrent qu'une indépendance budgétaire est tout à fait viable.",
    "sources": [
      "Banque Mondiale - Indicateurs | https://data.worldbank.org/",
      "Observatoire québécois de la souveraineté | https://www.observatoire-souverainete.com/"
    ]
  },
  {
    "id": 3,
    "category": "Fiscalités & Transferts",
    "claim": "« Le Québec dépend financièrement du Canada et ne pourrait pas survivre seul »",
    "context": "Argument fédéraliste courant pour montrer l'interdépendance économique.",
    "rebuttal": "Le Québec paie environ 18-20 % des impôts fédéraux avec 23 % de la population. Les transferts en santé/éducation sont par capita, donc le Québec reçoit moins qu'il ne contribue. Un Québec souverain aurait accès aux revenus fiscaux (impôts, TPS, droits d'accise, taxes sur le carbone, etc.) actuellement versés à Ottawa. Des analyses indépendantes (IRPP, Institut Économique) démontrent que le Québec dispose des revenus suffisants pour financer ses services publics.",
    "sources": [
      "Statistiques Canada - Comptes économiques provinciaux | https://www.statcan.gc.ca/",
      "Institut de recherche en politiques publiques (IRPP) - Fiscal Federalism | https://irpp.org/",
      "CIRANO - Analyses fiscales Québec | https://www.cirano.qc.ca/"
    ]
  },
  {
    "id": 4,
    "category": "Viabilité économique",
    "claim": "« Un Québec indépendant serait en crise économique immédiate »",
    "context": "Scénario catastrophe présenté lors de campagnes référendaires (ex: 1995, campagne NON)",
    "rebuttal": "Le Québec a un PIB de ~$400 milliards (plus grand que la Suisse, la Suède). D'autres petites nations indépendantes (Nouvelle-Zélande, Irlande, Danemark, Belgique ~12M habitants) ont des économies stables et prospères. Un Québec souverain aurait accès aux marchés de capitaux, pourrait émettre sa propre devise/obligations, aurait des institutions établies. Les modèles de transition économique (comme ceux de la Slovénie 1991) montrent que des ajustements court-terme existent mais ne causent pas d'effondrement.",
    "sources": [
      "Statistiques Canada - PIB provinciaux | https://www.statcan.gc.ca/",
      "OCDE - Small countries economic profiles | https://www.oecd.org/",
      "Banque mondiale - Indicateurs économiques | https://data.worldbank.org/",
      "Étude COSEF (Commission Statut Économique Financier) 1978 | Archives nationales"
    ]
  },
  {
    "id": 5,
    "category": "Dette & Passifs financiers",
    "claim": "« Le Québec devrait assumer une part énorme de la dette canadienne, ce qui le ruinerait »",
    "context": "Argument que le partage de la dette ferait du Québec un État insolvable",
    "rebuttal": "Le partage de la dette fédérale entre provinces est un enjeu de négociation, pas déterminé à l'avance. Le Québec devrait assumer une part proportionnelle (~20 %), mais aussi récupérer une part proportionnelle des actifs fédéraux (immobilier, équipements, réserves). Les précédents historiques (Tchécoslovaquie 1993, Belgique, Yougoslavie) montrent que les États négocient des arrangements. De plus, la dette québécoise actuelle (~55-60 % du PIB) est comparable à celle d'autres nations occidentales.",
    "sources": [
      "Observatoire québécois de la souveraineté | https://www.observatoire-souverainete.com/",
      "Finance Canada - Rapport sur la dette fédérale | https://www.canada.ca/fr/",
      "FMI - Global Debt Statistics | https://www.imf.org/",
      "Études scientifiques Université du Québec à Montréal (UQAM) sur partage d'actifs"
    ]
  },
  {
    "id": 6,
    "category": "RRQ vs CPP",
    "claim": "« Les retraités québécois perdraient leur pension de retraite si le Québec devient souverain »",
    "context": "Peur que les droits acquis (CPP/RRQ) disparaissent lors d'une indépendance",
    "rebuttal": "Le Régime de rentes du Québec (RRQ) est déjà géré par le Québec depuis 1966. Les cotisations des Québécois au RRQ restent à Québec (Caisse de dépôt et placement du Québec gère des dizaines de milliards). En indépendance, le Québec continuerait simplement le RRQ. Les droits acquis sont protégés par droit québécois et international. Le CPP (Régime canadien) pour les contribuables fédéraux serait l'équivalent d'une pension fédérale — négociable mais sécurisé.",
    "sources": [
      "Régie des rentes du Québec (RRQ) | https://www.rrq.gouv.qc.ca/",
      "Caisse de dépôt et placement du Québec | https://www.cdpq.com/",
      "Services Canada - CPP | https://www.canada.ca/fr/",
      "Analyses juridiques UQAM - Droits acquis"
    ]
  },
  {
    "id": 7,
    "category": "Droits & Libertés",
    "claim": "« La Charte des droits et libertés disparaîtrait, les Québécois perdraient leurs droits »",
    "context": "Crainte que l'indépendance signifie fin des protections légales",
    "rebuttal": "Un Québec souverain aurait sa propre charte ou constitutionnaliserait les droits existants. La Charte québécoise (1975) est antérieure à la Charte canadienne (1982) et tout aussi solide. D'autres États souverains (France, Suède, Nouvelle-Zélande) protègent les droits mieux qu'avant leur indépendance grâce à des constitutions fortes. Aucune nation indépendante n'a régressé juridiquement après l'indépendance.",
    "sources": [
      "Charte québécoise des droits et libertés de la personne | https://www.quebec.ca/",
      "Charte canadienne des droits et libertés | https://laws-lois.justice.gc.ca/",
      "Conseil des droits de l'homme (ONU) | https://www.ohchr.org/"
    ]
  },
  {
    "id": 8,
    "category": "Emploie & Bien être",
    "claim": "« L'indépendance causerait une augmentation massive du chômage »",
    "context": "Prédiction d'effondrement de l'emploi post-référendaire",
    "rebuttal": "Les données économiques post-référendaires (1995) montrent que le Québec a continué sa croissance d'emploi durant les années 2000-2020. Les modèles d'autres micro-États (Luxembourg, Islande) montrent que l'indépendance n'entraîne pas de chômage structurel. Les secteurs clés du Québec (aérospatiale, biotech, énergie) sont compétitifs et bénéficieraient d'une politique économique autonome. Les études économétriques ne montrent pas de corrélation causal entre indépendance et chômage.",
    "sources": [
      "Statistiques Canada - Taux de chômage provinciaux | https://www.statcan.gc.ca/",
      "OCDE - Labour Force Statistics | https://www.oecd.org/",
      "Décrochage-chômage Québec 1995-2020 (données historiques) | Archives"
    ]
  }
];

let currentFilter = null;

function renderSidebar() {
  const categories = [...new Set(debunks.map(d => d.category))].sort();
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = `
    <div class="category">
      <h3>Catégories</h3>
      <button onclick="filterCategory(null)" class="active">Tous</button>
      ${categories.map(cat => `<button onclick="filterCategory('${cat}')">${cat}</button>`).join('')}
    </div>
  `;
}

function filterCategory(cat) {
  currentFilter = cat;
  renderList();
  document.querySelectorAll('aside button').forEach(b => b.classList.remove('active'));
  if (!cat) {
    document.querySelector('aside button').classList.add('active');
  } else {
    document.querySelectorAll('aside button').forEach(b => {
      if (b.textContent === cat) b.classList.add('active');
    });
  }
}

function renderList() {
  const search = document.getElementById('search').value.toLowerCase();
  const filtered = debunks.filter(d => {
    const matchCat = !currentFilter || d.category === currentFilter;
    const matchSearch = !search || d.claim.toLowerCase().includes(search) || d.category.toLowerCase().includes(search);
    return matchCat && matchSearch;
  });

  const list = document.getElementById('debunk-list');
  list.innerHTML = filtered.length ? filtered.map(d => `
    <div class="debunk-item" onclick="showDetail(${d.id})">
      <div class="debunk-category">${d.category}</div>
      <div class="debunk-claim">${d.claim}</div>
      <div class="debunk-meta">Débunké • ${d.sources.length} source${d.sources.length > 1 ? 's' : ''}</div>
    </div>
  `).join('') : '<p style="color: #999; padding: 2rem; text-align: center;">Aucun résultat.</p>';
}

function showDetail(id) {
  const debunk = debunks.find(d => d.id === id);
  if (!debunk) return;

  const detail = document.getElementById('debunk-detail');
  detail.innerHTML = `
    <button onclick="backToList()" style="margin-bottom: 1.5rem;">← Retour</button>
    <h2>${debunk.claim}</h2>
    
    <div class="section">
      <h3>Contexte</h3>
      <p>${debunk.context}</p>
    </div>

    <div class="section">
      <h3>Réfutation</h3>
      <p>${debunk.rebuttal}</p>
    </div>

    <div class="section">
      <h3>Sources</h3>
      <div class="sources">
        ${debunk.sources.map(s => {
          const parts = s.split(' | ');
          const title = parts[0] || 'Source';
          const url = parts[1] || '';
          return `<div class="source">• <strong>${title}</strong> ${url ? `<a href="${url}" target="_blank" rel="noopener">🔗</a>` : ''}</div>`;
        }).join('')}
      </div>
    </div>

    <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
      <button onclick="openEditModal(${id})">Éditer</button>
      <button onclick="deleteDebunk(${id})" style="color: #d32f2f;">Supprimer</button>
    </div>
  `;
  detail.classList.add('show');
  document.getElementById('debunk-list').style.display = 'none';
}

function backToList() {
  document.getElementById('debunk-detail').classList.remove('show');
  document.getElementById('debunk-list').style.display = 'block';
}

function openAddModal() {
  document.getElementById('modal-title').textContent = 'Ajouter un debunk';
  document.getElementById('form-category').value = '';
  document.getElementById('form-claim').value = '';
  document.getElementById('form-context').value = '';
  document.getElementById('form-rebuttal').value = '';
  document.getElementById('form-sources').value = '';
  document.getElementById('modal').dataset.editId = '';
  document.getElementById('modal').classList.add('open');
}

function openEditModal(id) {
  const debunk = debunks.find(d => d.id === id);
  document.getElementById('modal-title').textContent = 'Éditer ce debunk';
  document.getElementById('form-category').value = debunk.category;
  document.getElementById('form-claim').value = debunk.claim;
  document.getElementById('form-context').value = debunk.context;
  document.getElementById('form-rebuttal').value = debunk.rebuttal;
  document.getElementById('form-sources').value = debunk.sources.join('\n');
  document.getElementById('modal').dataset.editId = id;
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function saveDebunk() {
  const category = document.getElementById('form-category').value.trim();
  const claim = document.getElementById('form-claim').value.trim();
  const context = document.getElementById('form-context').value.trim();
  const rebuttal = document.getElementById('form-rebuttal').value.trim();
  const sourceText = document.getElementById('form-sources').value.trim();

  if (!category || !claim || !rebuttal) {
    alert('Remplissez: catégorie, affirmation et réfutation');
    return;
  }

  const sources = sourceText.split('\n').filter(s => s.trim());
  const editId = document.getElementById('modal').dataset.editId;

  if (editId) {
    const idx = debunks.findIndex(d => d.id == editId);
    debunks[idx] = { ...debunks[idx], category, claim, context, rebuttal, sources };
  } else {
    debunks.push({
      id: Math.max(...debunks.map(d => d.id), 0) + 1,
      category, claim, context, rebuttal, sources
    });
  }

  localStorage.setItem('debunks', JSON.stringify(debunks));
  closeModal();
  renderSidebar();
  renderList();
  backToList();
}

function deleteDebunk(id) {
  if (!confirm('Supprimer ce debunk?')) return;
  debunks = debunks.filter(d => d.id !== id);
  localStorage.setItem('debunks', JSON.stringify(debunks));
  renderSidebar();
  renderList();
  backToList();
}

document.getElementById('search').addEventListener('input', renderList);

renderSidebar();
renderList();
</script>
</body>
</html>
